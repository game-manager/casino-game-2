<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gyanb Slot - Kira Edition</title>
    <style>
        * { box-sizing: border-box; }
        body.dark {
            background-color: #202020;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; min-height: 100vh; margin: 0;
            overflow-x: hidden; overflow-y: auto; position: relative;
            padding: 10px 60px; font-family: 'Courier New', Courier, monospace;
        }
        .side-bar { position: fixed; top: 0; width: 50px; height: 100%; background-color: #000; transition: background 0.2s; z-index: 1; }
        #left-bar { left: 0; } #right-bar { right: 0; }

        @keyframes rainbowSlide {
            0%   { background-position: 0% 0%; }
            100% { background-position: 0% 200%; }
        }
        .side-bar.rainbow {
            background: linear-gradient(to bottom,
                #ff0000, #ff7700, #ffff00, #00ff00,
                #00ffff, #0000ff, #ff00ff, #ff0000,
                #ff7700, #ffff00, #00ff00, #00ffff,
                #0000ff, #ff00ff, #ff0000);
            background-size: 100% 200%;
            animation: rainbowSlide 0.6s linear infinite;
            transition: none;
        }

        #coin-display {
            margin-top: 10px; background: linear-gradient(135deg,#1a1a1a,#2a2a2a);
            border: 2px solid #c0a000; border-radius: 12px; padding: 10px 30px;
            text-align: center; width: 100%; max-width: 480px;
        }
        #coin-display .label { color:#888; font-size:11px; letter-spacing:2px; text-transform:uppercase; }
        #coin-display .amount { color:#ffd700; font-size:28px; font-weight:bold; text-shadow:0 0 10px #ffd70066; }
        #coin-display .coin-unit { color:#c0a000; font-size:13px; margin-left:4px; }
        #player-id-display { color:#555; font-size:10px; letter-spacing:1px; margin-top:3px; }

        #bet-panel {
            margin-top: 12px; background: linear-gradient(135deg,#1a1a1a,#2a2a2a);
            border: 2px solid #444; border-radius: 12px; padding: 14px 20px;
            width: 100%; max-width: 480px;
        }
        #bet-panel .section-title { color:#aaa; font-size:11px; letter-spacing:3px; text-align:center; margin-bottom:10px; }
        .bet-buttons { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
        .bet-btn {
            background:#2a2a2a; color:#ffd700; border:1px solid #555; border-radius:6px;
            padding:7px 12px; font-size:13px; font-weight:bold; font-family:'Courier New',monospace;
            cursor:pointer; transition:all 0.15s;
        }
        .bet-btn:hover { background:#3a3a0a; border-color:#c0a000; }
        .bet-btn.selected { background:#c0a000; color:#000; border-color:#ffd700; box-shadow:0 0 8px #ffd70066; }
        .bet-custom-row { display:flex; gap:8px; align-items:center; justify-content:center; }
        #custom-bet {
            background:#111; color:#ffd700; border:1px solid #555; border-radius:6px;
            padding:7px 12px; font-size:13px; font-family:'Courier New',monospace;
            width:130px; text-align:right;
        }
        #custom-bet:focus { outline:none; border-color:#ffd700; }
        .custom-label { color:#888; font-size:12px; }
        #current-bet-display { margin-top:10px; text-align:center; font-size:13px; color:#888; min-height:18px; }
        #current-bet-display .bet-val { color:#ffd700; font-weight:bold; }
        .payout-hint { margin-top:8px; display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
        .payout-item { font-size:10px; color:#666; text-align:center; }
        .payout-item span { display:block; color:#aaa; font-weight:bold; }

        #start-btn {
            margin-top:14px; width:100%; max-width:480px; padding:14px;
            background:linear-gradient(135deg,#c00000,#800000); color:#fff; border:none;
            border-radius:10px; font-size:18px; font-weight:bold; font-family:'Courier New',monospace;
            letter-spacing:4px; cursor:pointer; box-shadow:0 5px #500000,0 0 20px #c0000066; transition:all 0.15s;
        }
        #start-btn:hover:not(:disabled) { background:linear-gradient(135deg,#e00000,#a00000); }
        #start-btn:active:not(:disabled) { transform:translateY(4px); box-shadow:none; }
        #start-btn:disabled { background:#444; box-shadow:none; cursor:not-allowed; color:#888; }

        .reel-area { display:flex; gap:14px; margin-top:16px; z-index:10; }
        .reel-column { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .reel-window {
            width:130px; height:110px; border:4px solid #444; border-radius:10px;
            overflow:hidden; background-color:white; position:relative;
        }
        .reel-strip { display:flex; flex-direction:column; animation:spin 0.75s linear infinite; }
        .reel-strip img { width:130px; height:110px; object-fit:contain; padding:8px; box-sizing:border-box; }
        @keyframes spin { 0%{transform:translateY(0);} 100%{transform:translateY(-770px);} }

        @keyframes reachPulse {
            0%,100% { border-color:#444; box-shadow:none; }
            50% { border-color:#ffdd00; box-shadow:0 0 22px #ffdd0099; }
        }
        .reel-window.reach-flash { animation:reachPulse 0.45s ease-in-out infinite; }

        .stop-btn {
            width:80px; height:38px; background-color:#c00000; color:white; border:none;
            border-radius:5px; font-weight:bold; font-family:'Courier New',monospace;
            cursor:pointer; box-shadow:0 4px #800000; outline:none;
        }
        .stop-btn:active:not(:disabled) { box-shadow:none; transform:translateY(4px); }
        .stop-btn:disabled { background-color:#555; box-shadow:none; transform:translateY(4px); cursor:not-allowed; }

        #result-banner {
            margin-top:10px; min-height:36px; text-align:center; font-size:14px;
            font-weight:bold; color:#ffd700; letter-spacing:1px;
        }
        #result-banner.win { color:#00ff88; text-shadow:0 0 10px #00ff8866; }
        #result-banner.lose { color:#ff4444; }

        #effect-overlay {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:100; pointer-events:none; display:none; text-align:center;
        }
        #effect-img { max-width:400px; transition:transform 0.3s ease-out; }

        .kira-particle {
            position:fixed; width:90px; height:90px; z-index:150;
            pointer-events:none; animation:kira-fade 1s ease-out forwards;
        }
        @keyframes kira-fade {
            0%{transform:scale(0) rotate(0deg);opacity:0;}
            50%{opacity:1;}
            100%{transform:scale(1.5) rotate(180deg);opacity:0;}
        }
        .egg-size-1{transform:scale(1.2);} .egg-size-2{transform:scale(1.5);}
        .egg-size-3{transform:scale(2.0);} .chance-large{transform:scale(1.8);}
        .spacer{height:20px;}

        /* 管理者から強制更新された時のフラッシュ */
        @keyframes adminFlash {
            0%,100%{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);}
            50%{background:linear-gradient(135deg,#1a2a1a,#2a3a2a);}
        }
        .admin-updated { animation: adminFlash 0.6s ease-in-out 3; }
    </style>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref as dbRef, set, onValue, push }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ============================================================
//  🔧 Firebase 設定 — admin.html と同じ値に書き換えてください
// ============================================================
const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
};
// ============================================================

const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// ---- プレイヤーID生成 (localStorage で永続化) ----
let playerId = localStorage.getItem('casino_player_id');
if (!playerId) {
    playerId = 'player_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('casino_player_id', playerId);
}
document.getElementById('player-id-display').textContent = 'ID: ' + playerId;

const playerRef = dbRef(db, `players/${playerId}`);
const historyRef = dbRef(db, `history/${playerId}`);

// ---- 初期データが存在しなければ作成 ----
import { get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
get(playerRef).then(snap => {
    if (!snap.exists()) {
        set(playerRef, { coins: 10000, online: true, lastPlayAt: null });
    } else {
        // オンライン状態を更新
        set(dbRef(db, `players/${playerId}/online`), true);
        // Firebase から残高を読み込んで同期
        const saved = snap.val().coins;
        if (typeof saved === 'number') {
            window._fbCoins = saved;
            coins = saved;
            updateCoinDisplay();
        }
    }
});

// ---- 管理者からの残高変更をリアルタイム監視 ----
let _prevCoins = null;
onValue(dbRef(db, `players/${playerId}/coins`), snap => {
    const val = snap.val();
    if (typeof val !== 'number') return;
    if (_prevCoins !== null && val !== coins) {
        // 管理者による変更を検知
        coins = val;
        updateCoinDisplay();
        // コイン表示をフラッシュ
        const cd = document.getElementById('coin-display');
        cd.classList.remove('admin-updated');
        void cd.offsetWidth; // reflow
        cd.classList.add('admin-updated');
    }
    _prevCoins = val;
});

// ---- オフライン時に online フラグを false に ----
import { onDisconnect } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
onDisconnect(dbRef(db, `players/${playerId}/online`)).set(false);

// ---- Firebase に残高を保存する関数 (ゲームロジックから呼び出す) ----
window.fbSaveCoins = (c) => {
    set(dbRef(db, `players/${playerId}/coins`), c);
    set(dbRef(db, `players/${playerId}/lastPlayAt`), Date.now());
};

// ---- プレイ履歴を記録する関数 ----
window.fbLogHistory = (result, bet, mult) => {
    push(historyRef, { result, bet, mult: mult || 0, at: Date.now() });
};
</script>

<script>
// ============================================================
//  AUDIO ENGINE — 即時発音 / コンプレッサー / VOL×4.5
// ============================================================
const ACtxClass = window.AudioContext || window.webkitAudioContext;
let _ctx=null, _master=null, _comp=null, _rainbowGain=null;

function ensureCtx() {
    if (_ctx) { if (_ctx.state==='suspended') _ctx.resume(); return; }
    _ctx = new ACtxClass();
    _comp = _ctx.createDynamicsCompressor();
    _comp.threshold.value=-3; _comp.knee.value=6;
    _comp.ratio.value=6; _comp.attack.value=0.001; _comp.release.value=0.08;
    _master = _ctx.createGain(); _master.gain.value=1.0;
    _rainbowGain = _ctx.createGain(); _rainbowGain.gain.value=1.0;
    _master.connect(_rainbowGain);
    _rainbowGain.connect(_comp);
    _comp.connect(_ctx.destination);
}
const VOL = 4.5;
function out() { return _master; }
function now() { return _ctx.currentTime + 0.001; }

function tone(freq, type, dur, vol, off=0) {
    const t=now()+off;
    const osc=_ctx.createOscillator(), g=_ctx.createGain();
    osc.connect(g); g.connect(out());
    osc.type=type; osc.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol*VOL,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    osc.start(t); osc.stop(t+dur+0.01);
}

function noise(dur, vol=0.1, off=0) {
    const t=now()+off, sr=_ctx.sampleRate;
    const n=Math.floor(sr*dur);
    const buf=_ctx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    const src=_ctx.createBufferSource(), g=_ctx.createGain();
    src.buffer=buf; src.connect(g); g.connect(out());
    g.gain.setValueAtTime(vol*VOL,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.start(t); src.stop(t+dur+0.01);
}

function glide(f0,f1,type,dur,vol,off=0) {
    const t=now()+off;
    const osc=_ctx.createOscillator(), g=_ctx.createGain();
    osc.connect(g); g.connect(out()); osc.type=type;
    osc.frequency.setValueAtTime(f0,t);
    osc.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol*VOL,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.02);
    osc.start(t); osc.stop(t+dur+0.05);
}

// ============================================================
//  リール回転音
// ============================================================
let _reelNodes = [];
let _reelAlertInterval = null;

const ALERT_PITCHES = [
    [1047, 784],
    [880,  659],
    [1047, 784],
    [1175, 880],
];
let _alertStep = 0;

function sfxReelStart() {
    sfxReelStop();
    ensureCtx();
    _alertStep = 0;

    function fireAlert() {
        if (!_ctx || !_reelNodes.length) return;
        const ctx = _ctx;
        const t = ctx.currentTime + 0.001;
        const pair = ALERT_PITCHES[_alertStep % ALERT_PITCHES.length];
        _alertStep++;

        const o1 = ctx.createOscillator(), g1 = ctx.createGain();
        o1.connect(g1); g1.connect(out());
        o1.type = 'square';
        o1.frequency.setValueAtTime(pair[0], t);
        g1.gain.setValueAtTime(0.042 * VOL, t);
        g1.gain.setValueAtTime(0.042 * VOL, t + 0.045);
        g1.gain.exponentialRampToValueAtTime(0.0001, t + 0.10);
        o1.start(t); o1.stop(t + 0.12);

        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(out());
        o2.type = 'square';
        o2.frequency.setValueAtTime(pair[1], t + 0.13);
        g2.gain.setValueAtTime(0.038 * VOL, t + 0.13);
        g2.gain.setValueAtTime(0.038 * VOL, t + 0.175);
        g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
        o2.start(t + 0.13); o2.stop(t + 0.26);

        const o3 = ctx.createOscillator(), g3 = ctx.createGain();
        o3.connect(g3); g3.connect(out());
        o3.type = 'sine';
        o3.frequency.setValueAtTime(pair[0] * 1.26, t);
        g3.gain.setValueAtTime(0.012 * VOL, t);
        g3.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
        o3.start(t); o3.stop(t + 0.10);
    }

    fireAlert();
    _reelAlertInterval = setInterval(fireAlert, 320);

    const sentinel = { isInterval: false, stop: ()=>{}, disconnect: ()=>{} };
    _reelNodes = [sentinel];
}

function _stopAlertInterval() {
    if (_reelAlertInterval !== null) {
        clearInterval(_reelAlertInterval);
        _reelAlertInterval = null;
    }
}

function sfxReelStop() {
    _stopAlertInterval();
    _reelNodes.forEach(n => {
        try { if (n.stop) n.stop(); } catch(e){}
        try { n.disconnect(); } catch(e){}
    });
    _reelNodes = [];
}

let _reelFadeLevel = 1.0;
function sfxReelFade(level) {
    _stopAlertInterval();
    if (_reelNodes.length === 0) return;
    const interval = level > 0.5 ? 320 : level > 0.1 ? 600 : 900;
    function fireAlertFaded() {
        if (!_ctx || !_reelNodes.length) return;
        const ctx = _ctx;
        const t = ctx.currentTime + 0.001;
        const pair = ALERT_PITCHES[_alertStep % ALERT_PITCHES.length];
        _alertStep++;
        const v = level * 0.042;
        const o1 = ctx.createOscillator(), g1 = ctx.createGain();
        o1.connect(g1); g1.connect(out()); o1.type='square';
        o1.frequency.setValueAtTime(pair[0],t);
        g1.gain.setValueAtTime(v*VOL,t);
        g1.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
        o1.start(t); o1.stop(t+0.10);
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(out()); o2.type='square';
        o2.frequency.setValueAtTime(pair[1],t+0.12);
        g2.gain.setValueAtTime(v*0.85*VOL,t+0.12);
        g2.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
        o2.start(t+0.12); o2.stop(t+0.23);
    }
    _reelAlertInterval = setInterval(fireAlertFaded, interval);
}

// ============================================================
//  その他効果音
// ============================================================
function sfxStart() { tone(880,'sine',0.07,0.28); tone(1100,'sine',0.09,0.28,0.08); }
function sfxStop() { noise(0.05,0.22); tone(180,'square',0.07,0.14); }
function sfxReach() {
    const s=[330,392,494,587,698,880];
    s.forEach((f,i)=>tone(f,'sine',0.13,0.26,i*0.10));
    [0,0.20,0.40,0.60].forEach(d=>noise(0.05,0.15,d));
}
function sfxChance(isBig) {
    if(isBig){[523,659,784,1047,1319].forEach((f,i)=>tone(f,'square',0.13,0.33,i*0.08));tone(1568,'sine',0.45,0.38,0.48);}
    else{[440,554,659].forEach((f,i)=>tone(f,'sine',0.15,0.26,i*0.12));tone(880,'sine',0.28,0.28,0.42);}
}
function sfxFlash() { tone(700,'square',0.04,0.20); tone(900,'square',0.04,0.20,0.05); tone(1100,'square',0.04,0.20,0.10); }
function sfxEgg(stage) {
    const ff=[[300,450],[400,600],[550,820]];
    tone(ff[stage][0],'sine',0.20,0.28); tone(ff[stage][1],'sine',0.16,0.18,0.10);
}
function sfxKira() {
    [1047,1319,1568,2093,1568,2093,2637].forEach((f,i)=>tone(f,'sine',0.20,0.36,i*0.09));
    setTimeout(()=>{ensureCtx();[1568,1976,2637].forEach((f,i)=>tone(f,'triangle',0.14,0.26,i*0.06));},720);
}
function sfxWin(mult) {
    if(mult>=50){
        [523,523,659,784,784,1047,784,1047,1319].forEach((f,i)=>tone(f,'square',0.15,0.42,i*0.08));
        setTimeout(()=>{ensureCtx();[1047,1319,1568,2093].forEach((f,i)=>tone(f,'sine',0.26,0.38,i*0.06));},780);
        setTimeout(()=>{ensureCtx();noise(0.28,0.14);},1100);
    } else if(mult>=10){
        [523,659,784,1047,1319].forEach((f,i)=>tone(f,'square',0.13,0.38,i*0.09));
        tone(1568,'sine',0.28,0.33,0.50);
    } else {
        [523,659,784].forEach((f,i)=>tone(f,'sine',0.13,0.33,i*0.12));
        tone(1047,'sine',0.23,0.28,0.40);
    }
}
function sfxLose() {
    tone(220,'sawtooth',0.24,0.28); tone(165,'sawtooth',0.28,0.22,0.18);
    tone(110,'sawtooth',0.24,0.18,0.42); noise(0.10,0.08);
}
function sfxReachMiss() {
    [523,659,784].forEach((f,i)=>tone(f,'square',0.09,0.50,i*0.07));
    glide(400,40,'sawtooth',0.75,0.70,0.24);
    glide(300,50,'square', 0.65,0.52,0.26);
    noise(0.45,0.55,0.26); noise(0.28,0.38,0.50);
    tone(80,'sine',0.55,0.44,0.88); tone(60,'sine',0.65,0.38,1.00); noise(0.20,0.28,0.90);
}

// ============================================================
//  GAME LOGIC
// ============================================================

let IMG_DATA_CURRENT = [
    "gyanb/gyanb1_transparent.png","gyanb/gyanb2_transparent.png",
    "gyanb/gyanb3_transparent.png","gyanb/gyanb4_tr.png",
    "gyanb/gyanb5_transparent.png","gyanb/gyanb6_transparent.png",
    "gyanb/gyanb7n-transparent.png"
];
const IMG_7_NORMAL = "gyanb/gyanb7n-transparent.png";
const IMG_7_KAKUHEN= "gyanb/gyanb7_transparent.png";

const ODD_SET=[0,2,4], EVEN_SET=[1,3,5], SEVEN=6;

let coins=10000, currentBet=0;
let stoppedCount=0, firstResultIndex=null, secondResultIndex=null, thirdResultIndex=null;
let Atsu=0, gameRunning=false, totalStartCount=0;

let earlyReachUsed = false;

let consecutiveAnyLose = 0;
let kakuhenActive      = false;
let kakuhenWinRound    = 0;
let kakuhenReachCount  = 0;
const initialCoins     = 10000;

let _rainbowLoopInterval = null;

function startRainbowSound() {
    stopRainbowSound();
    function fireRainbow() {
        if (!_ctx) return;
        const s=[330,392,494,587,698,880];
        s.forEach((f,i)=>tone(f,'sine',0.13,0.26,i*0.10));
        [0,0.20,0.40,0.60].forEach(d=>noise(0.05,0.15,d));
    }
    fireRainbow();
    _rainbowLoopInterval = setInterval(fireRainbow, 1400);
}

function stopRainbowSound() {
    if (_rainbowLoopInterval !== null) {
        clearInterval(_rainbowLoopInterval);
        _rainbowLoopInterval = null;
    }
}

function setRainbow(on) {
    const L=document.getElementById("left-bar"), R=document.getElementById("right-bar");
    if(on){
        L.classList.add('rainbow'); R.classList.add('rainbow');
        if(_rainbowGain){
            _rainbowGain.gain.cancelScheduledValues(_ctx.currentTime);
            _rainbowGain.gain.setValueAtTime(0.8, _ctx.currentTime);
        }
        if(_rainbowLoopInterval === null) startRainbowSound();
    } else {
        L.classList.remove('rainbow'); R.classList.remove('rainbow');
        L.style.backgroundColor='#000'; R.style.backgroundColor='#000';
        if(_rainbowGain){
            _rainbowGain.gain.cancelScheduledValues(_ctx.currentTime);
            _rainbowGain.gain.setValueAtTime(1.0, _ctx.currentTime);
        }
        stopRainbowSound();
    }
}

function rebuildReels(){
    [1,2,3].forEach(n=>{
        const s=document.getElementById(`reel${n}`);
        const wasSpinning = s.style.animation && s.style.animation.includes('spin');
        s.innerHTML=[...IMG_DATA_CURRENT,...IMG_DATA_CURRENT,...IMG_DATA_CURRENT,...IMG_DATA_CURRENT]
            .map(src=>`<img src="${src}">`).join('');
        if(!wasSpinning){ s.style.animation='none'; s.style.transition=''; s.style.transform='translateY(0)'; }
    });
}

function setKakuhenMode(on){
    kakuhenActive=on;
    IMG_DATA_CURRENT[SEVEN] = on ? IMG_7_KAKUHEN : IMG_7_NORMAL;
}

function getComboMultiplier(r1, r2, r3){
    const vals = [r1, r2, r3].sort((a,b)=>a-b);
    if(vals[0]===0 && vals[1]===1 && vals[2]===2) return 8;
    if(vals[0]===3 && vals[1]===4 && vals[2]===5) return 6;
    return 0;
}

function getMultiplier(idx){
    if(idx===SEVEN) return 15;
    if(ODD_SET.includes(idx)) return 10;
    if(EVEN_SET.includes(idx)) return 5;
    return 0;
}

function init(){
    updateCoinDisplay();
    rebuildReels();
}

function updateCoinDisplay(){
    document.getElementById("coinshow").innerText=coins.toLocaleString();
    // Firebase に同期 (fbSaveCoins はゲーム終了時のみ呼ぶので、ここでは coins 変数だけ更新)
}

function selectBet(amount,btn){
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); document.getElementById('custom-bet').value='';
    currentBet=amount; updateBetDisplay();
}
function onCustomBetInput(input){
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('selected'));
    const v=parseInt(input.value); currentBet=(!isNaN(v)&&v>0)?v:0; updateBetDisplay();
}
function updateBetDisplay(){
    const txt=document.getElementById('bet-val-text'), btn=document.getElementById('start-btn');
    if(currentBet>0){txt.innerText=currentBet.toLocaleString()+' G';btn.disabled=gameRunning;}
    else{txt.innerText='未選択';btn.disabled=true;}
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function showEffectImage(src,duration,cls=''){
    const ov=document.getElementById("effect-overlay"), im=document.getElementById("effect-img");
    im.src=src; im.className=cls; ov.style.display="block";
    await sleep(duration); ov.style.display="none"; im.className='';
}

async function showKiraEffect(count=20){
    sfxKira();
    for(let i=0;i<count;i++){
        const k=document.createElement("img");
        k.src="gyanb/kira_transparent.png"; k.className="kira-particle";
        k.style.top=`${30+Math.random()*40}%`; k.style.left=`${30+Math.random()*40}%`;
        document.body.appendChild(k); await sleep(50); setTimeout(()=>k.remove(),1000);
    }
    await sleep(1000);
}

async function flashSides(times){
    const cols=['#ff0000','#ffff00','#00ff00','#0000ff','#ff00ff','#00ffff'];
    const L=document.getElementById("left-bar"),R=document.getElementById("right-bar");
    for(let i=0;i<times;i++) for(let c of cols){
        sfxFlash(); L.style.backgroundColor=c; R.style.backgroundColor=c; await sleep(250);
    }
    L.style.backgroundColor='#000'; R.style.backgroundColor='#000';
}

function getNextFromSet(cur,set){
    const cn=cur+1; let nx=null;
    for(let v of set.map(i=>i+1).sort((a,b)=>a-b)) if(v>cn){nx=v;break;}
    if(nx===null)nx=set[0]+1; return nx-1;
}

function showResultBanner(msg,cls){
    const b=document.getElementById('result-banner'); b.innerText=msg; b.className=cls||'';
}

function triggerReachEffect(){
    sfxReach();
    [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.add('reach-flash'));
    setTimeout(()=>[1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash')),3500);
}

function setBetLocked(locked){
    document.querySelectorAll('.bet-btn').forEach(b=>b.disabled=locked);
    document.getElementById('custom-bet').disabled=locked;
    const op = locked ? '0.4' : '1';
    document.querySelectorAll('.bet-btn').forEach(b=>b.style.opacity=op);
    document.getElementById('custom-bet').style.opacity=op;
}

let noOddReach = false;

function startGame(){
    if(currentBet<=0) return;
    if(currentBet>coins){showResultBanner("コインが足りません！","lose");sfxLose();return;}
    ensureCtx();

    const shouldKakuhen = !kakuhenActive && consecutiveAnyLose>=5 && coins<=initialCoins*1.5;
    if(shouldKakuhen){
        (async()=>{
            await triggerKakuhen();
            _doStartGame();
        })();
        return;
    }
    _doStartGame();
}

function _doStartGame(){
    coins-=currentBet; updateCoinDisplay(); totalStartCount++;
    gameRunning=true; stoppedCount=0;
    firstResultIndex=null; secondResultIndex=null; thirdResultIndex=null; Atsu=0;
    noOddReach = (coins >= initialCoins * 2.5);
    setBetLocked(true);
    document.getElementById('start-btn').disabled=true;
    document.getElementById('result-banner').innerText='';
    document.getElementById('result-banner').className='';
    [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash'));
    if(kakuhenActive){ setRainbow(true); } else { setRainbow(false); }
    rebuildReels();
    [1,2,3].forEach(n=>{
        const s=document.getElementById(`reel${n}`);
        s.style.transition=''; s.style.transform='translateY(0)';
        s.style.animation='spin 0.75s linear infinite';
        document.getElementById(`stopbtn${n}`).disabled=false;
    });
    sfxStart();
    setTimeout(()=>{ensureCtx();sfxReelStart();},150);
}

function decideReach(currentIndex){
    if(kakuhenActive){ return firstResultIndex; }
    if(noOddReach && ODD_SET.includes(firstResultIndex)){
        return pickNonMatchRandom(currentIndex, firstResultIndex);
    }
    const ruleA = (totalStartCount<=3 && !earlyReachUsed);
    if(ruleA && Math.random()<0.70) return firstResultIndex;
    return pickRandom(currentIndex);
}

function pickRandom(currentIndex){
    const r=Math.random();
    if     (r<0.6) return getNextFromSet(currentIndex,EVEN_SET);
    else if(r<0.9) return getNextFromSet(currentIndex,ODD_SET);
    else            return currentIndex===SEVEN?SEVEN:getNextFromSet(currentIndex,EVEN_SET);
}

function pickNonMatchRandom(currentIndex, exclude){
    let idx;
    let tries=0;
    do {
        idx = pickRandom(currentIndex);
        tries++;
    } while(idx===exclude && tries<20);
    return idx;
}

async function triggerKakuhen(){
    setBetLocked(true);
    setRainbow(true);
    sfxFlash(); sfxFlash();
    await sleep(400);
    await showEffectImage("gyanb/kakuhen_transparent.png", 1800, "chance-large");
    setRainbow(true);
    setKakuhenMode(true);
    rebuildReels();
    if(coins <= initialCoins * 0.5){
        kakuhenWinRound = Math.floor(Math.random()*2)+1;
    } else {
        kakuhenWinRound = Math.floor(Math.random()*4)+1;
    }
    kakuhenReachCount = 0;
    consecutiveAnyLose = 0;
}

async function stopReel(reelId,btn){
    const reel=document.getElementById(reelId);
    if(btn.disabled) return;
    btn.disabled=true; stoppedCount++;

    sfxStop();

    if     (stoppedCount===1) sfxReelFade(0.35);
    else if(stoppedCount===2) sfxReelFade(0.12);
    else                      sfxReelStop();

    const st=window.getComputedStyle(reel);
    let currentY=0;
    try{const m=new WebKitCSSMatrix(st.transform);currentY=m.m42;}catch(e){}
    const currentIndex=((Math.abs(Math.round(currentY/110))%7)+7)%7;

    let targetIndex;

    if(stoppedCount===1){
        if(kakuhenActive){
            if(coins <= initialCoins*0.5){
                targetIndex = SEVEN;
            } else {
                targetIndex = Math.random()<0.5 ? SEVEN : ODD_SET[Math.floor(Math.random()*ODD_SET.length)];
            }
        } else {
            targetIndex = pickRandom(currentIndex);
        }
        firstResultIndex = targetIndex;

    } else if(stoppedCount===2){
        targetIndex = decideReach(currentIndex);
        secondResultIndex = targetIndex;

        if(firstResultIndex===secondResultIndex){
            if(!earlyReachUsed) earlyReachUsed=true;
            if(kakuhenActive){ kakuhenReachCount++; }
            setTimeout(()=>triggerReachEffect(), 350);
        }

    } else {
        if(firstResultIndex===secondResultIndex){
            Atsu=0;

            if(kakuhenActive){
                const isWinRound = (kakuhenReachCount === kakuhenWinRound);

                if(isWinRound){
                    sfxChance(true);
                    await showEffectImage("gyanb/big_chance_transparent.png",1800,"chance-large");
                    Atsu+=70; await flashSides(2); Atsu+=80; Atsu+=70;
                    sfxEgg(0);await showEffectImage("gyanb/egg_2_transparent.png",1400,"egg-size-1");
                    sfxEgg(1);await showEffectImage("gyanb/egg_2-2_transparent.png",1400,"egg-size-2");
                    sfxEgg(2);await showEffectImage("gyanb/egg_2-3_transparent.png",1400,"egg-size-3");
                } else {
                    sfxChance(false);
                    await showEffectImage("gyanb/normal_chance_transparent.png",1800,"chance-large");
                    Atsu+=30;
                    sfxEgg(0);await showEffectImage("gyanb/egg_1_transparent.png",1400,"egg-size-1");
                    sfxEgg(1);await showEffectImage("gyanb/egg_1-2_transparent.png",1400,"egg-size-2");
                    sfxEgg(2);await showEffectImage("gyanb/egg_1-3_transparent.png",1400,"egg-size-3");
                }

                if(isWinRound){
                    const richBlock = coins>=initialCoins*3.5 && EVEN_SET.includes(firstResultIndex);
                    if(richBlock){
                        targetIndex=(firstResultIndex+1)%7;
                        consecutiveAnyLose++;
                        setTimeout(()=>{ sfxReachMiss(); showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose"); },500);
                        if(window.fbSaveCoins) window.fbSaveCoins(coins);
                        if(window.fbLogHistory) window.fbLogHistory('lose', currentBet, 0);
                    } else {
                        await showKiraEffect(20);
                        targetIndex=firstResultIndex;
                        setKakuhenMode(false);
                        setRainbow(false);
                        setBetLocked(false);
                        kakuhenWinRound=0; kakuhenReachCount=0;
                        consecutiveAnyLose=0;
                        setTimeout(()=>{
                            const mult=getMultiplier(targetIndex), payout=currentBet*mult;
                            coins+=payout; updateCoinDisplay(); sfxWin(mult);
                            showResultBanner(`🎉 当たり！ ×${mult} → +${payout.toLocaleString()} G`,"win");
                            if(window.fbSaveCoins) window.fbSaveCoins(coins);
                            if(window.fbLogHistory) window.fbLogHistory('win', currentBet, mult);
                        },500);
                    }
                } else {
                    targetIndex=(firstResultIndex+1)%7;
                    consecutiveAnyLose++;
                    setTimeout(()=>{ sfxReachMiss(); showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose"); },500);
                    if(window.fbSaveCoins) window.fbSaveCoins(coins);
                    if(window.fbLogHistory) window.fbLogHistory('lose', currentBet, 0);
                }

            } else {
                const isBig=Math.random()>=0.7;
                sfxChance(isBig);
                await showEffectImage(isBig?"gyanb/big_chance_transparent.png":"gyanb/normal_chance_transparent.png",1800,"chance-large");
                Atsu+=isBig?70:30;
                const sr2=Math.random();
                if     (sr2<0.3){await flashSides(1);Atsu+=70;}
                else if(sr2<0.5){await flashSides(2);Atsu+=80;}
                const eggType=Math.random()<0.7?"1":"2";
                Atsu+=(eggType==="1"?30:70);
                sfxEgg(0);await showEffectImage(`gyanb/egg_${eggType}_transparent.png`,1400,"egg-size-1");
                sfxEgg(1);await showEffectImage(`gyanb/egg_${eggType}-2_transparent.png`,1400,"egg-size-2");
                sfxEgg(2);await showEffectImage(`gyanb/egg_${eggType}-3_transparent.png`,1400,"egg-size-3");

                let winProb=Atsu*0.454; if(winProb<30)winProb=0;
                let isWin=Math.random()*100<winProb;
                if(isWin && coins>=initialCoins*3.5 && EVEN_SET.includes(firstResultIndex)) isWin=false;

                if(isWin){
                    await showKiraEffect(20);
                    targetIndex=firstResultIndex;
                    consecutiveAnyLose=0;
                    setTimeout(()=>{
                        const mult=getMultiplier(targetIndex), payout=currentBet*mult;
                        coins+=payout; updateCoinDisplay(); sfxWin(mult);
                        showResultBanner(`🎉 当たり！ ×${mult} → +${payout.toLocaleString()} G`,"win");
                        if(window.fbSaveCoins) window.fbSaveCoins(coins);
                        if(window.fbLogHistory) window.fbLogHistory('win', currentBet, mult);
                    },500);
                } else {
                    targetIndex=(firstResultIndex+1)%7;
                    consecutiveAnyLose++;
                    setTimeout(()=>{ sfxReachMiss(); showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose"); },500);
                    if(window.fbSaveCoins) window.fbSaveCoins(coins);
                    if(window.fbLogHistory) window.fbLogHistory('lose', currentBet, 0);
                }
            }

        } else {
            thirdResultIndex = currentIndex;
            const r1=firstResultIndex, r2=secondResultIndex, r3=thirdResultIndex;
            const combo = getComboMultiplier(r1, r2, r3);
            if(combo > 0){
                targetIndex = currentIndex;
                const payout = currentBet * combo;
                coins += payout; updateCoinDisplay(); sfxWin(combo);
                consecutiveAnyLose=0;
                setTimeout(()=>{
                    showResultBanner(`🎊 コンボ！ ×${combo} → +${payout.toLocaleString()} G`,"win");
                    if(window.fbSaveCoins) window.fbSaveCoins(coins);
                    if(window.fbLogHistory) window.fbLogHistory('combo', currentBet, combo);
                },500);
            } else {
                consecutiveAnyLose++;
                targetIndex=(currentIndex+1)%7;
                setTimeout(()=>{
                    sfxLose(); showResultBanner(`ハズレ… 掛け金 -${currentBet.toLocaleString()} G`,"lose");
                    if(window.fbSaveCoins) window.fbSaveCoins(coins);
                    if(window.fbLogHistory) window.fbLogHistory('lose', currentBet, 0);
                },500);
            }
        }
    }

    let diff=targetIndex-currentIndex;
    if(diff===0){
        reel.style.animation='none'; reel.style.transform=`translateY(${currentY}px)`;
    } else {
        if(diff<0) diff+=7;
        const finalY=(Math.round(currentY/110)-diff)*110;
        reel.style.animation='none'; reel.style.transform=`translateY(${currentY}px)`;
        setTimeout(()=>{reel.style.transition='transform 0.4s ease-out';reel.style.transform=`translateY(${finalY}px)`;},10);
    }

    if(stoppedCount===3){
        setTimeout(()=>{
            stoppedCount=0; Atsu=0; gameRunning=false;
            [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash'));
            if(!kakuhenActive) setBetLocked(false);
            if(currentBet>0&&coins>0) document.getElementById('start-btn').disabled=false;
        },3000);
    }
}

window.onload=init;
</script>
