<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gyanb Slot - Kira Edition</title>
    <style>
        * { box-sizing: border-box; }
        body.dark {
            background-color: #202020;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; min-height: 100vh; margin: 0;
            overflow-x: hidden; overflow-y: auto; position: relative;
            padding: 10px 60px; font-family: 'Courier New', Courier, monospace;
        }
        .side-bar { position: fixed; top: 0; width: 50px; height: 100%; background-color: #000; transition: background 0.2s; z-index: 1; }
        #left-bar { left: 0; } #right-bar { right: 0; }

        @keyframes rainbowSlide {
            0%   { background-position: 0% 0%; }
            100% { background-position: 0% 200%; }
        }
        .side-bar.rainbow {
            background: linear-gradient(to bottom,
                #ff0000, #ff7700, #ffff00, #00ff00,
                #00ffff, #0000ff, #ff00ff, #ff0000,
                #ff7700, #ffff00, #00ff00, #00ffff,
                #0000ff, #ff00ff, #ff0000);
            background-size: 100% 200%;
            animation: rainbowSlide 0.6s linear infinite;
            transition: none;
        }

        #coin-display {
            margin-top: 10px; background: linear-gradient(135deg,#1a1a1a,#2a2a2a);
            border: 2px solid #c0a000; border-radius: 12px; padding: 10px 30px;
            text-align: center; width: 100%; max-width: 480px;
        }
        #coin-display .label { color:#888; font-size:11px; letter-spacing:2px; text-transform:uppercase; }
        #coin-display .amount { color:#ffd700; font-size:28px; font-weight:bold; text-shadow:0 0 10px #ffd70066; }
        #coin-display .coin-unit { color:#c0a000; font-size:13px; margin-left:4px; }
        #player-id-display { color:#555; font-size:10px; letter-spacing:1px; margin-top:3px; }

        #bet-panel {
            margin-top: 12px; background: linear-gradient(135deg,#1a1a1a,#2a2a2a);
            border: 2px solid #444; border-radius: 12px; padding: 14px 20px;
            width: 100%; max-width: 480px;
        }
        #bet-panel .section-title { color:#aaa; font-size:11px; letter-spacing:3px; text-align:center; margin-bottom:10px; }
        .bet-buttons { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
        .bet-btn {
            background:#2a2a2a; color:#ffd700; border:1px solid #555; border-radius:6px;
            padding:7px 12px; font-size:13px; font-weight:bold; font-family:'Courier New',monospace;
            cursor:pointer; transition:all 0.15s;
        }
        .bet-btn:hover { background:#3a3a0a; border-color:#c0a000; }
        .bet-btn.selected { background:#c0a000; color:#000; border-color:#ffd700; box-shadow:0 0 8px #ffd70066; }
        .bet-custom-row { display:flex; gap:8px; align-items:center; justify-content:center; }
        #custom-bet {
            background:#111; color:#ffd700; border:1px solid #555; border-radius:6px;
            padding:7px 12px; font-size:13px; font-family:'Courier New',monospace;
            width:130px; text-align:right;
        }
        #custom-bet:focus { outline:none; border-color:#ffd700; }
        .custom-label { color:#888; font-size:12px; }
        #current-bet-display { margin-top:10px; text-align:center; font-size:13px; color:#888; min-height:18px; }
        #current-bet-display .bet-val { color:#ffd700; font-weight:bold; }
        .payout-hint { margin-top:8px; display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
        .payout-item { font-size:10px; color:#666; text-align:center; }
        .payout-item span { display:block; color:#aaa; font-weight:bold; }

        #start-btn {
            margin-top:14px; width:100%; max-width:480px; padding:14px;
            background:linear-gradient(135deg,#c00000,#800000); color:#fff; border:none;
            border-radius:10px; font-size:18px; font-weight:bold; font-family:'Courier New',monospace;
            letter-spacing:4px; cursor:pointer; box-shadow:0 5px #500000,0 0 20px #c0000066; transition:all 0.15s;
        }
        #start-btn:hover:not(:disabled) { background:linear-gradient(135deg,#e00000,#a00000); }
        #start-btn:active:not(:disabled) { transform:translateY(4px); box-shadow:none; }
        #start-btn:disabled { background:#444; box-shadow:none; cursor:not-allowed; color:#888; }

        .reel-area { display:flex; gap:14px; margin-top:16px; z-index:10; }
        .reel-column { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .reel-window {
            width:130px; height:110px; border:4px solid #444; border-radius:10px;
            overflow:hidden; background-color:white; position:relative;
        }
        .reel-strip { display:flex; flex-direction:column; animation:spin 0.75s linear infinite; }
        .reel-strip img { width:130px; height:110px; object-fit:contain; padding:8px; box-sizing:border-box; }
        @keyframes spin { 0%{transform:translateY(0);} 100%{transform:translateY(-770px);} }

        @keyframes reachPulse {
            0%,100% { border-color:#444; box-shadow:none; }
            50% { border-color:#ffdd00; box-shadow:0 0 22px #ffdd0099; }
        }
        .reel-window.reach-flash { animation:reachPulse 0.45s ease-in-out infinite; }

        .stop-btn {
            width:80px; height:38px; background-color:#c00000; color:white; border:none;
            border-radius:5px; font-weight:bold; font-family:'Courier New',monospace;
            cursor:pointer; box-shadow:0 4px #800000; outline:none;
        }
        .stop-btn:active:not(:disabled) { box-shadow:none; transform:translateY(4px); }
        .stop-btn:disabled { background-color:#555; box-shadow:none; transform:translateY(4px); cursor:not-allowed; }

        #result-banner {
            margin-top:10px; min-height:36px; text-align:center; font-size:14px;
            font-weight:bold; color:#ffd700; letter-spacing:1px;
        }
        #result-banner.win { color:#00ff88; text-shadow:0 0 10px #00ff8866; }
        #result-banner.lose { color:#ff4444; }

        #effect-overlay {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:100; pointer-events:none; display:none; text-align:center;
        }
        #effect-img { max-width:400px; transition:transform 0.3s ease-out; }

        .kira-particle {
            position:fixed; width:90px; height:90px; z-index:150;
            pointer-events:none; animation:kira-fade 1s ease-out forwards;
        }
        @keyframes kira-fade {
            0%{transform:scale(0) rotate(0deg);opacity:0;}
            50%{opacity:1;}
            100%{transform:scale(1.5) rotate(180deg);opacity:0;}
        }
        .egg-size-1{transform:scale(1.2);} .egg-size-2{transform:scale(1.5);}
        .egg-size-3{transform:scale(2.0);} .chance-large{transform:scale(1.8);}
        .spacer{height:20px;}

        @keyframes adminFlash {
            0%,100%{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);}
            50%{background:linear-gradient(135deg,#1a3a1a,#2a4a2a);}
        }
        .admin-updated { animation: adminFlash 0.5s ease-in-out 3; }

        /* =============================================
           管理者パネル — オーバーレイ全画面
           Ctrl+Shift+A で開閉
           ログインしていない場合はログイン画面を表示
        ============================================= */
        #admin-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 9000;
            background: rgba(0,0,0,0.92);
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
        }
        #admin-overlay.open { display: block; }

        /* 閉じるボタン */
        #admin-close-btn {
            position: fixed; top: 14px; right: 18px; z-index: 9100;
            background: #2a2a2a; color: #888; border: 1px solid #555;
            border-radius: 6px; padding: 6px 14px; font-size: 13px;
            font-family: 'Courier New', monospace; cursor: pointer;
            letter-spacing: 1px; transition: all 0.15s;
        }
        #admin-close-btn:hover { background: #3a1a1a; color: #ff5555; border-color: #ff5555; }

        /* ---- ログイン画面 ---- */
        #admin-login-screen {
            max-width: 380px; margin: 80px auto;
            background: #1a1a1a; border: 2px solid #444;
            border-radius: 14px; padding: 36px 32px;
        }
        #admin-login-screen h2 {
            color: #ffd700; text-align: center;
            margin-bottom: 22px; letter-spacing: 4px; font-size: 18px;
        }
        .adm-form-group { margin-bottom: 14px; }
        .adm-form-group label {
            display: block; color: #888;
            font-size: 11px; letter-spacing: 2px; margin-bottom: 5px;
        }
        .adm-form-group input {
            width: 100%; padding: 10px 12px;
            background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 14px;
        }
        .adm-form-group input:focus { outline: none; border-color: #ffd700; }
        #adm-login-btn {
            width: 100%; padding: 11px; margin-top: 6px;
            background: linear-gradient(135deg,#c0a000,#806800);
            color: #000; border: none; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px;
            font-weight: bold; letter-spacing: 3px; cursor: pointer;
        }
        #adm-login-btn:hover { background: linear-gradient(135deg,#ffd700,#c0a000); }
        #adm-login-error { color: #ff5555; font-size: 11px; text-align: center; margin-top: 8px; min-height: 16px; }

        /* ---- メイン管理画面 ---- */
        #admin-main-screen { display: none; max-width: 860px; margin: 0 auto; padding: 24px 16px 40px; }

        .adm-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 26px; flex-wrap: wrap; gap: 10px;
        }
        .adm-header h1 {
            color: #ffd700; font-size: 20px; letter-spacing: 4px;
            text-shadow: 0 0 10px #ffd70033; margin: 0;
        }
        .adm-header-right { display: flex; align-items: center; gap: 12px; }
        .adm-live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: #0a1a0a; border: 1px solid #44ff88;
            border-radius: 20px; padding: 3px 10px;
            font-size: 10px; color: #44ff88; letter-spacing: 1px;
        }
        .adm-live-dot {
            width: 6px; height: 6px; background: #44ff88;
            border-radius: 50%; animation: adm-pulse 1.2s ease-in-out infinite;
        }
        @keyframes adm-pulse { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        #adm-logout-btn {
            padding: 6px 14px; background: #2a2a2a;
            color: #888; border: 1px solid #444; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 11px;
            cursor: pointer; letter-spacing: 1px; transition: all 0.15s;
        }
        #adm-logout-btn:hover { background: #3a1a1a; color: #ff5555; border-color: #ff5555; }

        .adm-section-title {
            color: #888; font-size: 10px; letter-spacing: 3px;
            text-transform: uppercase; padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a; margin-bottom: 14px;
        }

        /* ---- プレイヤーテーブル ---- */
        #adm-players-section { margin-bottom: 30px; }
        #adm-players-table { width: 100%; border-collapse: collapse; }
        #adm-players-table th {
            background: #161616; color: #666;
            font-size: 10px; letter-spacing: 2px;
            padding: 9px 12px; text-align: left;
            border-bottom: 2px solid #2a2a2a;
        }
        #adm-players-table td {
            padding: 10px 12px; border-bottom: 1px solid #1e1e1e;
            font-size: 13px; vertical-align: middle;
        }
        #adm-players-table tr:hover td { background: #161616; }
        .adm-badge-on  { display:inline-block; width:7px; height:7px; background:#44ff88; border-radius:50%; margin-right:7px; box-shadow:0 0 5px #44ff88; }
        .adm-badge-off { display:inline-block; width:7px; height:7px; background:#444;    border-radius:50%; margin-right:7px; }
        .adm-coins-val { color: #ffd700; font-weight: bold; }
        .adm-pid       { color: #888; font-size: 11px; }
        .adm-edit-btn {
            padding: 4px 11px; background: #1a2a1a;
            color: #44ff88; border: 1px solid #44ff88;
            border-radius: 5px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 11px;
            transition: all 0.15s;
        }
        .adm-edit-btn:hover { background: #44ff88; color: #000; }
        .adm-reset-btn {
            padding: 4px 11px; background: #2a1a1a;
            color: #ff5555; border: 1px solid #ff5555;
            border-radius: 5px; cursor: pointer; margin-left: 5px;
            font-family: 'Courier New', monospace; font-size: 11px;
            transition: all 0.15s;
        }
        .adm-reset-btn:hover { background: #ff5555; color: #fff; }
        #adm-no-players { color: #444; text-align: center; padding: 26px; font-size: 12px; }

        /* ---- 残高編集モーダル ---- */
        #adm-edit-modal {
            display: none; position: fixed; inset: 0; z-index: 9500;
            background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center;
        }
        #adm-edit-modal.open { display: flex; }
        .adm-modal-box {
            background: #1a1a1a; border: 2px solid #c0a000;
            border-radius: 14px; padding: 28px 26px; width: 320px;
        }
        .adm-modal-box h3 { color: #ffd700; margin-bottom: 16px; letter-spacing: 2px; font-size: 15px; }
        .adm-modal-box label { color: #888; font-size: 10px; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        #adm-modal-pid { color: #666; font-size: 11px; margin-bottom: 14px; }
        #adm-modal-coins-input {
            width: 100%; padding: 10px 12px;
            background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 20px;
            margin-bottom: 16px;
        }
        #adm-modal-coins-input:focus { outline: none; border-color: #ffd700; }
        .adm-modal-actions { display: flex; gap: 8px; }
        .adm-modal-save {
            flex: 1; padding: 10px;
            background: linear-gradient(135deg,#c0a000,#806800);
            color: #000; border: none; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 13px;
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }
        .adm-modal-save:hover { background: linear-gradient(135deg,#ffd700,#c0a000); }
        .adm-modal-cancel {
            flex: 1; padding: 10px; background: #222;
            color: #888; border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 13px; cursor: pointer;
        }
        .adm-modal-cancel:hover { background: #333; color: #ccc; }

        /* ---- プレイ履歴 ---- */
        #adm-history-section { margin-bottom: 28px; }
        .adm-history-filter { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .adm-history-filter label { color: #888; font-size: 11px; }
        #adm-history-sel {
            padding: 6px 10px; background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 12px; min-width: 160px;
        }
        #adm-history-sel:focus { outline: none; border-color: #ffd700; }
        #adm-history-list { max-height: 280px; overflow-y: auto; }
        .adm-hist-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid #1a1a1a; font-size: 11px;
        }
        .adm-hist-item:hover { background: #141414; }
        .adm-hist-win   { color: #44ff88; font-weight: bold; }
        .adm-hist-lose  { color: #ff5555; font-weight: bold; }
        .adm-hist-combo { color: #44ddff; font-weight: bold; }
        .adm-hist-time  { color: #444; }
        .adm-hist-change-pos { color: #44ff88; }
        .adm-hist-change-neg { color: #ff5555; }
        #adm-no-history { color: #444; text-align: center; padding: 20px; font-size: 12px; }

        /* ---- 全体リセット ---- */
        #adm-reset-section {
            background: #160808; border: 1px solid #3a1a1a;
            border-radius: 10px; padding: 18px 22px;
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
        }
        .adm-reset-desc { color: #888; font-size: 11px; line-height: 1.7; }
        .adm-reset-desc strong { color: #ff5555; }
        #adm-global-reset-btn {
            padding: 9px 20px; background: #3a0000;
            color: #ff5555; border: 1px solid #ff5555;
            border-radius: 7px; cursor: pointer; white-space: nowrap;
            font-family: 'Courier New', monospace;
            font-size: 12px; font-weight: bold; letter-spacing: 2px;
            transition: all 0.15s;
        }
        #adm-global-reset-btn:hover { background: #ff5555; color: #fff; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body class="dark">
    <div id="left-bar" class="side-bar"></div>
    <div id="right-bar" class="side-bar"></div>

    <!-- ゲーム本体 -->
    <div id="coin-display">
        <div class="label">所持コイン</div>
        <div class="amount"><span id="coinshow">10000</span><span class="coin-unit">G</span></div>
        <div id="player-id-display">接続中…</div>
    </div>

    <div id="bet-panel">
        <div class="section-title">掛け金を選ぶ</div>
        <div class="bet-buttons">
            <button class="bet-btn" onclick="selectBet(10,this)">10</button>
            <button class="bet-btn" onclick="selectBet(50,this)">50</button>
            <button class="bet-btn" onclick="selectBet(100,this)">100</button>
            <button class="bet-btn" onclick="selectBet(500,this)">500</button>
            <button class="bet-btn" onclick="selectBet(1000,this)">1000</button>
        </div>
        <div class="bet-custom-row">
            <span class="custom-label">自分で入力:</span>
            <input type="number" id="custom-bet" placeholder="金額" min="1" oninput="onCustomBetInput(this)">
        </div>
        <div id="current-bet-display">掛け金: <span class="bet-val" id="bet-val-text">未選択</span></div>
        <div class="payout-hint">
            <div class="payout-item"><span>2・4・6 揃い</span>×5</div>
            <div class="payout-item"><span>1・3・5 揃い</span>×10</div>
            <div class="payout-item"><span>7 揃い</span>×15</div>
            <div class="payout-item"><span>1・2・3 順不同</span>×8</div>
            <div class="payout-item"><span>4・5・6 順不同</span>×6</div>
        </div>
    </div>

    <button id="start-btn" onclick="startGame()" disabled>▶ START</button>

    <div class="reel-area">
        <div class="reel-column">
            <div class="reel-window" id="win1"><div class="reel-strip" id="reel1"></div></div>
            <button class="stop-btn" id="stopbtn1" onclick="stopReel('reel1',this)" disabled>STOP</button>
        </div>
        <div class="reel-column">
            <div class="reel-window" id="win2"><div class="reel-strip" id="reel2"></div></div>
            <button class="stop-btn" id="stopbtn2" onclick="stopReel('reel2',this)" disabled>STOP</button>
        </div>
        <div class="reel-column">
            <div class="reel-window" id="win3"><div class="reel-strip" id="reel3"></div></div>
            <button class="stop-btn" id="stopbtn3" onclick="stopReel('reel3',this)" disabled>STOP</button>
        </div>
    </div>

    <div id="result-banner"></div>
    <div id="effect-overlay"><img id="effect-img" src="" alt="演出"></div>
    <div class="spacer"></div>

    <!-- =============================================
         管理者パネル (Ctrl+Shift+A で開閉)
    ============================================= -->
    <div id="admin-overlay">
        <button id="admin-close-btn" onclick="closeAdminPanel()">✕ 閉じる</button>

        <!-- ログイン画面 -->
        <div id="admin-login-screen">
            <h2>🔐 ADMIN LOGIN</h2>
            <div class="adm-form-group">
                <label>EMAIL</label>
                <input type="email" id="adm-email" placeholder="admin@example.com">
            </div>
            <div class="adm-form-group">
                <label>PASSWORD</label>
                <input type="password" id="adm-password" placeholder="••••••••">
            </div>
            <button id="adm-login-btn" onclick="admDoLogin()">LOGIN</button>
            <div id="adm-login-error"></div>
        </div>

        <!-- メイン管理画面 -->
        <div id="admin-main-screen">
            <div class="adm-header">
                <h1>⚙ CASINO ADMIN</h1>
                <div class="adm-header-right">
                    <span class="adm-live-badge"><span class="adm-live-dot"></span>LIVE</span>
                    <span id="adm-logged-email" style="color:#666;font-size:11px;"></span>
                    <button id="adm-logout-btn" onclick="admDoLogout()">LOGOUT</button>
                </div>
            </div>

            <!-- プレイヤー一覧 -->
            <div id="adm-players-section">
                <div class="adm-section-title">👥 プレイヤー一覧 — 残高管理</div>
                <table id="adm-players-table">
                    <thead>
                        <tr>
                            <th>STATUS</th>
                            <th>プレイヤーID</th>
                            <th>残高 (G)</th>
                            <th>最終プレイ</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="adm-players-tbody">
                        <tr><td colspan="5" id="adm-no-players">読み込み中…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- プレイ履歴 -->
            <div id="adm-history-section">
                <div class="adm-section-title">📋 プレイ履歴</div>
                <div class="adm-history-filter">
                    <label>プレイヤー:</label>
                    <select id="adm-history-sel" onchange="admLoadHistory()"><option value="all">全員</option></select>
                </div>
                <div id="adm-history-list"><div id="adm-no-history">履歴なし</div></div>
            </div>

            <!-- 全体リセット -->
            <div id="adm-reset-section">
                <div class="adm-reset-desc">
                    <strong>⚠ 全体リセット</strong><br>
                    全プレイヤーの残高を 10,000G に戻し、プレイ履歴を消去します。
                </div>
                <button id="adm-global-reset-btn" onclick="admGlobalReset()">🔄 全員リセット</button>
            </div>
        </div>
    </div>

    <!-- 残高編集モーダル -->
    <div id="adm-edit-modal">
        <div class="adm-modal-box">
            <h3>✏ 残高を変更</h3>
            <label>プレイヤーID</label>

window.admLoadHistory = () => {
    const sel  = document.getElementById('adm-history-sel').value;
    const hRef = sel === 'all' ? dbRef(db,'history') : dbRef(db,`history/${sel}`);
    get(hRef).then(snap => {
        const container = document.getElementById('adm-history-list');
        const raw = snap.val();
        if (!raw) { container.innerHTML = '<div id="adm-no-history">履歴なし</div>'; return; }
        let items = [];
        if (sel === 'all') {
            Object.entries(raw).forEach(([pid, entries]) =>
                Object.values(entries).forEach(e => items.push({...e, pid})));
        } else {
            Object.values(raw).forEach(e => items.push({...e, pid:sel}));
        }
        items.sort((a,b) => b.at - a.at);
        items = items.slice(0, 100);
        container.innerHTML = items.map(e => {
            const time   = new Date(e.at).toLocaleString('ja-JP');
            const rCls   = e.result==='win' ? 'adm-hist-win' : e.result==='combo' ? 'adm-hist-combo' : 'adm-hist-lose';
            const rLabel = e.result==='win'   ? `🎉 当たり ×${e.mult}` :
                           e.result==='combo' ? `🎊 コンボ ×${e.mult}` : '💔 ハズレ';
            const diff   = e.result !== 'lose' ? e.bet * e.mult : -e.bet;
            const chCls  = diff >= 0 ? 'adm-hist-change-pos' : 'adm-hist-change-neg';
            const chTxt  = diff >= 0 ? `+${diff.toLocaleString()}G` : `${diff.toLocaleString()}G`;
            return `<div class="adm-hist-item">
                <span class="adm-pid">${escH(e.pid)}</span>
                <span class="${rCls}">${rLabel}</span>
                <span style="color:#666">Bet:${e.bet?.toLocaleString()}G</span>
                <span class="${chCls}">${chTxt}</span>
                <span class="adm-hist-time">${time}</span>
            </div>`;
        }).join('');
    });
};

function escH(s) {
    return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

    });
}
function setKakuhenMode(on){kakuhenActive=on;IMG_DATA_CURRENT[SEVEN]=on?IMG_7_KAKUHEN:IMG_7_NORMAL;}
function getComboMultiplier(r1,r2,r3){
    const v=[r1,r2,r3].sort((a,b)=>a-b);
    if(v[0]===0&&v[1]===1&&v[2]===2)return 8;
    if(v[0]===3&&v[1]===4&&v[2]===5)return 6;
    return 0;
}
function getMultiplier(idx){
    if(idx===SEVEN)return 15;
    if(ODD_SET.includes(idx))return 10;
    if(EVEN_SET.includes(idx))return 5;
    return 0;
}
function init(){updateCoinDisplay();rebuildReels();}
function updateCoinDisplay(){document.getElementById("coinshow").innerText=coins.toLocaleString();}
function selectBet(amount,btn){
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');document.getElementById('custom-bet').value='';
    currentBet=amount;updateBetDisplay();
}
function onCustomBetInput(input){
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('selected'));
    const v=parseInt(input.value);currentBet=(!isNaN(v)&&v>0)?v:0;updateBetDisplay();
}
function updateBetDisplay(){
    const txt=document.getElementById('bet-val-text'),btn=document.getElementById('start-btn');
    if(currentBet>0){txt.innerText=currentBet.toLocaleString()+' G';btn.disabled=gameRunning;}
    else{txt.innerText='未選択';btn.disabled=true;}
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function showEffectImage(src,duration,cls=''){
    const ov=document.getElementById("effect-overlay"),im=document.getElementById("effect-img");
    im.src=src;im.className=cls;ov.style.display="block";
    await sleep(duration);ov.style.display="none";im.className='';
}
async function showKiraEffect(count=20){
    sfxKira();
    for(let i=0;i<count;i++){
        const k=document.createElement("img");
        k.src="gyanb/kira_transparent.png";k.className="kira-particle";
        k.style.top=`${30+Math.random()*40}%`;k.style.left=`${30+Math.random()*40}%`;
        document.body.appendChild(k);await sleep(50);setTimeout(()=>k.remove(),1000);
    }
    await sleep(1000);
}
async function flashSides(times){
    const cols=['#ff0000','#ffff00','#00ff00','#0000ff','#ff00ff','#00ffff'];
    const L=document.getElementById("left-bar"),R=document.getElementById("right-bar");
    for(let i=0;i<times;i++)for(let c of cols){sfxFlash();L.style.backgroundColor=c;R.style.backgroundColor=c;await sleep(250);}
    L.style.backgroundColor='#000';R.style.backgroundColor='#000';
}
function getNextFromSet(cur,set){
    const cn=cur+1;let nx=null;
    for(let v of set.map(i=>i+1).sort((a,b)=>a-b))if(v>cn){nx=v;break;}
    if(nx===null)nx=set[0]+1;return nx-1;
}
function showResultBanner(msg,cls){
    const b=document.getElementById('result-banner');b.innerText=msg;b.className=cls||'';
}
function triggerReachEffect(){
    sfxReach();
    [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.add('reach-flash'));
    setTimeout(()=>[1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash')),3500);
}
function setBetLocked(locked){
    document.querySelectorAll('.bet-btn').forEach(b=>b.disabled=locked);
    document.getElementById('custom-bet').disabled=locked;
    const op=locked?'0.4':'1';
    document.querySelectorAll('.bet-btn').forEach(b=>b.style.opacity=op);
    document.getElementById('custom-bet').style.opacity=op;
}
let noOddReach=false;
function startGame(){
    if(currentBet<=0)return;
    if(currentBet>coins){showResultBanner("コインが足りません！","lose");sfxLose();return;}
    ensureCtx();
    const shouldKakuhen=!kakuhenActive&&consecutiveAnyLose>=5&&coins<=initialCoins*1.5;
    if(shouldKakuhen){(async()=>{await triggerKakuhen();_doStartGame();})();return;}
    _doStartGame();
}
function _doStartGame(){
    coins-=currentBet;updateCoinDisplay();totalStartCount++;
    gameRunning=true;stoppedCount=0;
    firstResultIndex=null;secondResultIndex=null;thirdResultIndex=null;Atsu=0;
    noOddReach=(coins>=initialCoins*2.5);
    setBetLocked(true);
    document.getElementById('start-btn').disabled=true;
    document.getElementById('result-banner').innerText='';
    document.getElementById('result-banner').className='';
    [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash'));
    if(kakuhenActive){setRainbow(true);}else{setRainbow(false);}
    rebuildReels();
    [1,2,3].forEach(n=>{
        const s=document.getElementById(`reel${n}`);
        s.style.transition='';s.style.transform='translateY(0)';
        s.style.animation='spin 0.75s linear infinite';
        document.getElementById(`stopbtn${n}`).disabled=false;
    });
    sfxStart();
    setTimeout(()=>{ensureCtx();sfxReelStart();},150);
}
function decideReach(currentIndex){
    if(kakuhenActive)return firstResultIndex;
    if(noOddReach&&ODD_SET.includes(firstResultIndex))return pickNonMatchRandom(currentIndex,firstResultIndex);
    const ruleA=(totalStartCount<=3&&!earlyReachUsed);
    if(ruleA&&Math.random()<0.70)return firstResultIndex;
    return pickRandom(currentIndex);
}
function pickRandom(currentIndex){
    const r=Math.random();
    if(r<0.6)return getNextFromSet(currentIndex,EVEN_SET);
    else if(r<0.9)return getNextFromSet(currentIndex,ODD_SET);
    else return currentIndex===SEVEN?SEVEN:getNextFromSet(currentIndex,EVEN_SET);
}
function pickNonMatchRandom(currentIndex,exclude){
    let idx,tries=0;
    do{idx=pickRandom(currentIndex);tries++;}while(idx===exclude&&tries<20);
    return idx;
}
async function triggerKakuhen(){
    setBetLocked(true);setRainbow(true);sfxFlash();sfxFlash();
    await sleep(400);
    await showEffectImage("gyanb/kakuhen_transparent.png",1800,"chance-large");
    setRainbow(true);setKakuhenMode(true);rebuildReels();
    kakuhenWinRound=coins<=initialCoins*0.5?Math.floor(Math.random()*2)+1:Math.floor(Math.random()*4)+1;
    kakuhenReachCount=0;consecutiveAnyLose=0;
}
async function stopReel(reelId,btn){
    const reel=document.getElementById(reelId);
    if(btn.disabled)return;
    btn.disabled=true;stoppedCount++;
    sfxStop();
    if(stoppedCount===1)sfxReelFade(0.35);
    else if(stoppedCount===2)sfxReelFade(0.12);
    else sfxReelStop();
    const st=window.getComputedStyle(reel);
    let currentY=0;
    try{const m=new WebKitCSSMatrix(st.transform);currentY=m.m42;}catch(e){}
    const currentIndex=((Math.abs(Math.round(currentY/110))%7)+7)%7;
    let targetIndex;
    if(stoppedCount===1){
        if(kakuhenActive){
            targetIndex=coins<=initialCoins*0.5?SEVEN:(Math.random()<0.5?SEVEN:ODD_SET[Math.floor(Math.random()*ODD_SET.length)]);
        }else{targetIndex=pickRandom(currentIndex);}
        firstResultIndex=targetIndex;
    }else if(stoppedCount===2){
        targetIndex=decideReach(currentIndex);secondResultIndex=targetIndex;
        if(firstResultIndex===secondResultIndex){
            if(!earlyReachUsed)earlyReachUsed=true;
            if(kakuhenActive)kakuhenReachCount++;
            setTimeout(()=>triggerReachEffect(),350);
        }
    }else{
        if(firstResultIndex===secondResultIndex){
            Atsu=0;
            if(kakuhenActive){
                const isWinRound=(kakuhenReachCount===kakuhenWinRound);
                if(isWinRound){
                    sfxChance(true);
                    await showEffectImage("gyanb/big_chance_transparent.png",1800,"chance-large");
                    Atsu+=70;await flashSides(2);Atsu+=80;Atsu+=70;
                    sfxEgg(0);await showEffectImage("gyanb/egg_2_transparent.png",1400,"egg-size-1");
                    sfxEgg(1);await showEffectImage("gyanb/egg_2-2_transparent.png",1400,"egg-size-2");
                    sfxEgg(2);await showEffectImage("gyanb/egg_2-3_transparent.png",1400,"egg-size-3");
                }else{
                    sfxChance(false);
                    await showEffectImage("gyanb/normal_chance_transparent.png",1800,"chance-large");
                    Atsu+=30;
                    sfxEgg(0);await showEffectImage("gyanb/egg_1_transparent.png",1400,"egg-size-1");
                    sfxEgg(1);await showEffectImage("gyanb/egg_1-2_transparent.png",1400,"egg-size-2");
                    sfxEgg(2);await showEffectImage("gyanb/egg_1-3_transparent.png",1400,"egg-size-3");
                }
                if(isWinRound){
                    const richBlock=coins>=initialCoins*3.5&&EVEN_SET.includes(firstResultIndex);
                    if(richBlock){
                        targetIndex=(firstResultIndex+1)%7;consecutiveAnyLose++;
                        setTimeout(()=>{sfxReachMiss();showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose");},500);
                        if(window.fbSaveCoins)window.fbSaveCoins(coins);
                        if(window.fbLogHistory)window.fbLogHistory('lose',currentBet,0);
                    }else{
                        await showKiraEffect(20);targetIndex=firstResultIndex;
                        setKakuhenMode(false);setRainbow(false);setBetLocked(false);
                        kakuhenWinRound=0;kakuhenReachCount=0;consecutiveAnyLose=0;
                        setTimeout(()=>{
                            const mult=getMultiplier(targetIndex),payout=currentBet*mult;
                            coins+=payout;updateCoinDisplay();sfxWin(mult);
                            showResultBanner(`🎉 当たり！ ×${mult} → +${payout.toLocaleString()} G`,"win");
                            if(window.fbSaveCoins)window.fbSaveCoins(coins);
                            if(window.fbLogHistory)window.fbLogHistory('win',currentBet,mult);
                        },500);
                    }
                }else{
                    targetIndex=(firstResultIndex+1)%7;consecutiveAnyLose++;
                    setTimeout(()=>{sfxReachMiss();showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose");},500);
                    if(window.fbSaveCoins)window.fbSaveCoins(coins);
                    if(window.fbLogHistory)window.fbLogHistory('lose',currentBet,0);
                }
            }else{
                const isBig=Math.random()>=0.7;
                sfxChance(isBig);
                await showEffectImage(isBig?"gyanb/big_chance_transparent.png":"gyanb/normal_chance_transparent.png",1800,"chance-large");
                Atsu+=isBig?70:30;
                const sr2=Math.random();
                if(sr2<0.3){await flashSides(1);Atsu+=70;}
                else if(sr2<0.5){await flashSides(2);Atsu+=80;}
                const eggType=Math.random()<0.7?"1":"2";
                Atsu+=(eggType==="1"?30:70);
                sfxEgg(0);await showEffectImage(`gyanb/egg_${eggType}_transparent.png`,1400,"egg-size-1");
                sfxEgg(1);await showEffectImage(`gyanb/egg_${eggType}-2_transparent.png`,1400,"egg-size-2");
                sfxEgg(2);await showEffectImage(`gyanb/egg_${eggType}-3_transparent.png`,1400,"egg-size-3");
                let winProb=Atsu*0.454;if(winProb<30)winProb=0;
                let isWin=Math.random()*100<winProb;
                if(isWin&&coins>=initialCoins*3.5&&EVEN_SET.includes(firstResultIndex))isWin=false;
                if(isWin){
                    await showKiraEffect(20);targetIndex=firstResultIndex;consecutiveAnyLose=0;
                    setTimeout(()=>{
                        const mult=getMultiplier(targetIndex),payout=currentBet*mult;
                        coins+=payout;updateCoinDisplay();sfxWin(mult);
                        showResultBanner(`🎉 当たり！ ×${mult} → +${payout.toLocaleString()} G`,"win");
                        if(window.fbSaveCoins)window.fbSaveCoins(coins);
                        if(window.fbLogHistory)window.fbLogHistory('win',currentBet,mult);
                    },500);
                }else{
                    targetIndex=(firstResultIndex+1)%7;consecutiveAnyLose++;
                    setTimeout(()=>{sfxReachMiss();showResultBanner(`💔 リーチ外れ… 掛け金 -${currentBet.toLocaleString()} G`,"lose");},500);
                    if(window.fbSaveCoins)window.fbSaveCoins(coins);
                    if(window.fbLogHistory)window.fbLogHistory('lose',currentBet,0);
                }
            }
        }else{
            thirdResultIndex=currentIndex;
            const r1=firstResultIndex,r2=secondResultIndex,r3=thirdResultIndex;
            const combo=getComboMultiplier(r1,r2,r3);
            if(combo>0){
                targetIndex=currentIndex;
                const payout=currentBet*combo;
                coins+=payout;updateCoinDisplay();sfxWin(combo);consecutiveAnyLose=0;
                setTimeout(()=>{
                    showResultBanner(`🎊 コンボ！ ×${combo} → +${payout.toLocaleString()} G`,"win");
                    if(window.fbSaveCoins)window.fbSaveCoins(coins);
                    if(window.fbLogHistory)window.fbLogHistory('combo',currentBet,combo);
                },500);
            }else{
                consecutiveAnyLose++;targetIndex=(currentIndex+1)%7;
                setTimeout(()=>{
                    sfxLose();showResultBanner(`ハズレ… 掛け金 -${currentBet.toLocaleString()} G`,"lose");
                    if(window.fbSaveCoins)window.fbSaveCoins(coins);
                    if(window.fbLogHistory)window.fbLogHistory('lose',currentBet,0);
                },500);
            }
        }
    }
    let diff=targetIndex-currentIndex;
    if(diff===0){
        reel.style.animation='none';reel.style.transform=`translateY(${currentY}px)`;
    }else{
        if(diff<0)diff+=7;
        const finalY=(Math.round(currentY/110)-diff)*110;
        reel.style.animation='none';reel.style.transform=`translateY(${currentY}px)`;
        setTimeout(()=>{reel.style.transition='transform 0.4s ease-out';reel.style.transform=`translateY(${finalY}px)`;},10);
    }
    if(stoppedCount===3){
        setTimeout(()=>{
            stoppedCount=0;Atsu=0;gameRunning=false;
            [1,2,3].forEach(n=>document.getElementById(`win${n}`).classList.remove('reach-flash'));
            if(!kakuhenActive)setBetLocked(false);
            if(currentBet>0&&coins>0)document.getElementById('start-btn').disabled=false;
        },3000);
    }
}

// ============================================================
//  Ctrl+Shift+A で管理者パネル開閉

document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') {
        e.preventDefault();
        const ov = document.getElementById('admin-overlay');
        if (ov.classList.contains('open')) {
            closeAdminPanel();
        } else {
            openAdminPanel();
        }
    }
});

window.onload=init;
</script>
