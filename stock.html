<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株取引シミュレーター</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-hover: #1f2b42;
            --border: #2a3a55;
            --text-primary: #e0e8f0;
            --text-secondary: #7a8ba0;
            --text-muted: #4a5a70;
            --green: #00d4aa;
            --green-dim: #00d4aa44;
            --red: #ff4466;
            --red-dim: #ff446644;
            --gold: #ffd700;
            --blue: #4a9eff;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 8px; }
        .market-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .market-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .balance-display {
            text-align: right;
        }
        .balance-label {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .balance-amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
        }
        .balance-amount .yen { font-size: 14px; color: var(--text-secondary); }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 340px 1fr 320px;
            gap: 0;
            height: calc(100vh - 56px);
        }

        /* Stock List Panel */
        .stock-list-panel {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .panel-title {
            padding: 14px 16px 10px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 10;
        }
        .stock-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1a2030;
            cursor: pointer;
            transition: background 0.15s;
        }
        .stock-item:hover { background: var(--bg-hover); }
        .stock-item.selected { background: var(--bg-card); border-left: 3px solid var(--gold); }
        .stock-info {
            flex: 1;
            min-width: 0;
        }
        .stock-symbol {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .stock-name {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stock-price-col {
            text-align: right;
            min-width: 100px;
        }
        .stock-price {
            font-size: 15px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .stock-change {
            font-size: 11px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .up { color: var(--green); }
        .down { color: var(--red); }
        .flat { color: var(--text-secondary); }
        .stock-sparkline {
            margin-left: 12px;
            width: 60px;
            height: 30px;
        }

        /* Chart Panel */
        .chart-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chart-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .chart-stock-info h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .chart-stock-info h2 span {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 10px;
        }
        .chart-price-large {
            font-size: 36px;
            font-weight: 700;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        .chart-change-large {
            font-size: 16px;
            font-weight: 600;
            margin-left: 12px;
        }
        .chart-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 1px;
        }
        .btn-buy {
            background: var(--green);
            color: #000;
        }
        .btn-buy:hover { background: #00e8bb; box-shadow: 0 0 20px var(--green-dim); }
        .btn-sell {
            background: var(--red);
            color: #fff;
        }
        .btn-sell:hover { background: #ff5577; box-shadow: 0 0 20px var(--red-dim); }
        .chart-area {
            flex: 1;
            padding: 16px 24px;
            position: relative;
            min-height: 0;
        }
        #main-chart {
            width: 100%;
            height: 100%;
        }

        /* Portfolio Panel */
        .portfolio-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .portfolio-summary {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .summary-label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .summary-value {
            font-size: 14px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .total-assets {
            font-size: 20px;
            color: var(--gold);
        }
        .portfolio-holdings {
            flex: 1;
            overflow-y: auto;
        }
        .holding-item {
            padding: 12px 16px;
            border-bottom: 1px solid #1a2030;
        }
        .holding-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .holding-symbol {
            font-weight: 700;
            font-size: 13px;
        }
        .holding-value {
            font-size: 13px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .holding-bottom {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }
        .holding-detail {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .holding-pl {
            font-size: 11px;
            font-weight: 600;
        }

        /* Trade History */
        .history-section {
            border-top: 1px solid var(--border);
        }
        .history-item {
            padding: 8px 16px;
            border-bottom: 1px solid #1a2030;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-action {
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .history-action.buy { background: var(--green-dim); color: var(--green); }
        .history-action.sell { background: var(--red-dim); color: var(--red); }
        .history-detail {
            color: var(--text-secondary);
            flex: 1;
            margin: 0 10px;
        }
        .history-amount {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h3 {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .modal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .modal-value {
            font-size: 15px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .qty-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
        .qty-input {
            width: 80px;
            text-align: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            padding: 8px;
            font-variant-numeric: tabular-nums;
        }
        .qty-input:focus { outline: none; border-color: var(--gold); }
        .modal-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            padding: 14px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-buttons .btn { flex: 1; }
        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-cancel:hover { background: var(--bg-hover); color: var(--text-primary); }
        .btn-confirm-buy { background: var(--green); color: #000; }
        .btn-confirm-buy:hover { background: #00e8bb; }
        .btn-confirm-sell { background: var(--red); color: #fff; }
        .btn-confirm-sell:hover { background: #ff5577; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 2000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a4a65; }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .stock-list-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 300px;
            }
            .chart-area { min-height: 300px; }
            .portfolio-panel {
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        /* Number animations */
        .flash-green { animation: flashG 0.4s; }
        .flash-red { animation: flashR 0.4s; }
        @keyframes flashG { 0% { background: var(--green-dim); } 100% { background: transparent; } }
        @keyframes flashR { 0% { background: var(--red-dim); } 100% { background: transparent; } }

        /* Reset Button */
        .btn-reset {
            padding: 6px 14px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.15s;
        }
        .btn-reset:hover { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <div class="logo">StockSim <span>株取引シミュレーター</span></div>
        <div class="market-status">
            <div class="market-dot"></div>
            <span>マーケット開場中</span>
        </div>
    </div>
    <div class="header-right">
        <button class="btn-reset" onclick="resetAll()">リセット</button>
        <div class="balance-display">
            <div class="balance-label">現金残高</div>
            <div class="balance-amount"><span class="yen">¥</span><span id="cash-display">10,000,000</span></div>
        </div>
    </div>
</div>

<!-- Main -->
<div class="main-container">
    <!-- Stock List -->
    <div class="stock-list-panel">
        <div class="panel-title">銘柄一覧</div>
        <div id="stock-list"></div>
    </div>

    <!-- Chart -->
    <div class="chart-panel">
        <div class="chart-header">
            <div class="chart-stock-info">
                <h2 id="chart-title">AAPL <span>Apple Inc.</span></h2>
                <div>
                    <span class="chart-price-large" id="chart-price">¥28,500</span>
                    <span class="chart-change-large" id="chart-change">+0.00%</span>
                </div>
            </div>
            <div class="chart-actions">
                <button class="btn btn-buy" onclick="openTrade('buy')">買い注文</button>
                <button class="btn btn-sell" onclick="openTrade('sell')">売り注文</button>
            </div>
        </div>
        <div class="chart-area">
            <canvas id="main-chart"></canvas>
        </div>
    </div>

    <!-- Portfolio -->
    <div class="portfolio-panel">
        <div class="portfolio-summary">
            <div class="panel-title" style="padding: 0 0 10px; border: none;">資産概要</div>
            <div class="summary-row">
                <span class="summary-label">総資産</span>
                <span class="summary-value total-assets" id="total-assets">¥10,000,000</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">現金</span>
                <span class="summary-value" id="summary-cash">¥10,000,000</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">保有株式評価額</span>
                <span class="summary-value" id="summary-stocks">¥0</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">損益</span>
                <span class="summary-value" id="summary-pl">¥0</span>
            </div>
        </div>
        <div class="panel-title">保有銘柄</div>
        <div class="portfolio-holdings" id="holdings-list">
            <div style="padding: 20px 16px; color: var(--text-muted); font-size: 12px; text-align: center;">
                まだ株を保有していません
            </div>
        </div>
        <div class="history-section">
            <div class="panel-title">取引履歴</div>
            <div id="history-list">
                <div style="padding: 16px; color: var(--text-muted); font-size: 12px; text-align: center;">
                    取引履歴はありません
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Trade Modal -->
<div class="modal-overlay" id="trade-modal">
    <div class="modal">
        <h3 id="modal-title">買い注文</h3>
        <div class="modal-row">
            <span class="modal-label">銘柄</span>
            <span class="modal-value" id="modal-stock">AAPL</span>
        </div>
        <div class="modal-row">
            <span class="modal-label">現在価格</span>
            <span class="modal-value" id="modal-price">¥28,500</span>
        </div>
        <div class="modal-row">
            <span class="modal-label">数量</span>
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-10)">-10</button>
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <input type="number" class="qty-input" id="trade-qty" value="1" min="1" onchange="updateTradeTotal()">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
                <button class="qty-btn" onclick="changeQty(10)">+10</button>
            </div>
        </div>
        <div class="modal-row modal-total">
            <span class="modal-label">合計金額</span>
            <span class="modal-value" id="modal-total">¥28,500</span>
        </div>
        <div id="modal-warning" style="color: var(--red); font-size: 12px; margin-bottom: 12px; min-height: 16px;"></div>
        <div class="modal-buttons">
            <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn btn-confirm-buy" id="modal-confirm" onclick="executeTrade()">注文確定</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ========================================
// Stock Data
// ========================================
const STOCKS = [
    { symbol: 'AAPL',  name: 'Apple Inc.',           nameJa: 'アップル',     price: 28500,  volatility: 0.015 },
    { symbol: 'GOOGL', name: 'Alphabet Inc.',         nameJa: 'グーグル',     price: 26250,  volatility: 0.018 },
    { symbol: 'AMZN',  name: 'Amazon.com Inc.',       nameJa: 'アマゾン',     price: 27750,  volatility: 0.020 },
    { symbol: 'TSLA',  name: 'Tesla Inc.',            nameJa: 'テスラ',       price: 26250,  volatility: 0.030 },
    { symbol: 'MSFT',  name: 'Microsoft Corp.',       nameJa: 'マイクロソフト', price: 63000,  volatility: 0.014 },
    { symbol: 'NVDA',  name: 'NVIDIA Corp.',          nameJa: 'エヌビディア',   price: 135000, volatility: 0.028 },
    { symbol: '7203',  name: 'Toyota Motor Corp.',    nameJa: 'トヨタ自動車',   price: 3500,   volatility: 0.012 },
    { symbol: '6758',  name: 'Sony Group Corp.',      nameJa: 'ソニーグループ', price: 13000,  volatility: 0.016 },
    { symbol: '7974',  name: 'Nintendo Co., Ltd.',    nameJa: '任天堂',       price: 8000,   volatility: 0.017 },
    { symbol: '9984',  name: 'SoftBank Group Corp.',  nameJa: 'ソフトバンクG',  price: 9500,   volatility: 0.025 },
];

// ========================================
// State
// ========================================
const INITIAL_CASH = 10000000;
let cash = INITIAL_CASH;
let holdings = {};      // { symbol: { qty, avgCost } }
let tradeHistory = [];  // [{ type, symbol, qty, price, time }]
let selectedSymbol = 'AAPL';
let tradeType = 'buy';  // 'buy' or 'sell'

// Price history for charts
const priceHistory = {};
const MAX_HISTORY = 200;

// Initialize prices and history
STOCKS.forEach(s => {
    s.currentPrice = s.price;
    s.prevPrice = s.price;
    s.openPrice = s.price;
    priceHistory[s.symbol] = [s.price];
});

// Load saved state
function loadState() {
    try {
        const saved = localStorage.getItem('stocksim_state');
        if (saved) {
            const state = JSON.parse(saved);
            cash = state.cash ?? INITIAL_CASH;
            holdings = state.holdings ?? {};
            tradeHistory = state.tradeHistory ?? [];
            if (state.prices) {
                STOCKS.forEach(s => {
                    if (state.prices[s.symbol]) {
                        s.currentPrice = state.prices[s.symbol];
                        s.prevPrice = s.currentPrice;
                        s.openPrice = state.openPrices?.[s.symbol] ?? s.currentPrice;
                        priceHistory[s.symbol] = state.priceHistory?.[s.symbol] ?? [s.currentPrice];
                    }
                });
            }
        }
    } catch(e) { /* ignore */ }
}

function saveState() {
    const prices = {};
    const openPrices = {};
    STOCKS.forEach(s => {
        prices[s.symbol] = s.currentPrice;
        openPrices[s.symbol] = s.openPrice;
    });
    localStorage.setItem('stocksim_state', JSON.stringify({
        cash, holdings, tradeHistory: tradeHistory.slice(-50),
        prices, openPrices, priceHistory
    }));
}

function resetAll() {
    if (!confirm('全データをリセットしますか？')) return;
    localStorage.removeItem('stocksim_state');
    cash = INITIAL_CASH;
    holdings = {};
    tradeHistory = [];
    STOCKS.forEach(s => {
        s.currentPrice = s.price;
        s.prevPrice = s.price;
        s.openPrice = s.price;
        priceHistory[s.symbol] = [s.price];
    });
    updateAll();
    showToast('データをリセットしました', 'success');
}

loadState();

// ========================================
// Price Simulation
// ========================================
function simulatePrices() {
    STOCKS.forEach(s => {
        s.prevPrice = s.currentPrice;
        // Geometric Brownian Motion-like simulation
        const drift = (Math.random() - 0.502) * 0.001; // slight random drift
        const shock = (Math.random() * 2 - 1) * s.volatility;
        const change = s.currentPrice * (drift + shock);
        s.currentPrice = Math.max(1, Math.round(s.currentPrice + change));

        // Add to history
        priceHistory[s.symbol].push(s.currentPrice);
        if (priceHistory[s.symbol].length > MAX_HISTORY) {
            priceHistory[s.symbol].shift();
        }
    });
}

// ========================================
// Rendering
// ========================================
function formatPrice(p) {
    return '¥' + Math.round(p).toLocaleString();
}

function renderStockList() {
    const container = document.getElementById('stock-list');
    container.innerHTML = '';
    STOCKS.forEach(s => {
        const change = s.currentPrice - s.openPrice;
        const changePct = ((change / s.openPrice) * 100).toFixed(2);
        const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
        const sign = change >= 0 ? '+' : '';

        const item = document.createElement('div');
        item.className = 'stock-item' + (s.symbol === selectedSymbol ? ' selected' : '');
        item.onclick = () => selectStock(s.symbol);

        const flashClass = s.currentPrice > s.prevPrice ? 'flash-green' :
                           s.currentPrice < s.prevPrice ? 'flash-red' : '';

        item.innerHTML = `
            <div class="stock-info">
                <div class="stock-symbol">${s.symbol}</div>
                <div class="stock-name">${s.nameJa}</div>
            </div>
            <div class="stock-price-col ${flashClass}">
                <div class="stock-price ${dir}">${formatPrice(s.currentPrice)}</div>
                <div class="stock-change ${dir}">${sign}${changePct}%</div>
            </div>
            <canvas class="stock-sparkline" data-symbol="${s.symbol}" width="60" height="30"></canvas>
        `;
        container.appendChild(item);
    });

    // Draw sparklines
    STOCKS.forEach(s => {
        const canvas = container.querySelector(`canvas[data-symbol="${s.symbol}"]`);
        if (canvas) drawSparkline(canvas, priceHistory[s.symbol]);
    });
}

function drawSparkline(canvas, data) {
    if (data.length < 2) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;

    const isUp = data[data.length - 1] >= data[0];
    ctx.strokeStyle = isUp ? '#00d4aa' : '#ff4466';
    ctx.lineWidth = 1.5;
    ctx.beginPath();

    for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((data[i] - min) / range) * (h - 4) - 2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

function renderChartHeader() {
    const s = STOCKS.find(st => st.symbol === selectedSymbol);
    if (!s) return;
    const change = s.currentPrice - s.openPrice;
    const changePct = ((change / s.openPrice) * 100).toFixed(2);
    const dir = change >= 0 ? 'up' : 'down';
    const sign = change >= 0 ? '+' : '';

    document.getElementById('chart-title').innerHTML =
        `${s.symbol} <span>${s.name}</span>`;
    document.getElementById('chart-price').textContent = formatPrice(s.currentPrice);
    document.getElementById('chart-price').className = 'chart-price-large ' + dir;

    const changeEl = document.getElementById('chart-change');
    changeEl.textContent = `${sign}${formatPrice(change)} (${sign}${changePct}%)`;
    changeEl.className = 'chart-change-large ' + dir;
}

function drawMainChart() {
    const canvas = document.getElementById('main-chart');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;

    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const data = priceHistory[selectedSymbol] || [];

    ctx.clearRect(0, 0, w, h);

    if (data.length < 2) return;

    const padding = { top: 30, right: 80, bottom: 40, left: 20 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;

    const min = Math.min(...data) * 0.999;
    const max = Math.max(...data) * 1.001;
    const range = max - min || 1;

    // Grid lines
    ctx.strokeStyle = '#1a2a40';
    ctx.lineWidth = 1;
    const gridLines = 5;
    for (let i = 0; i <= gridLines; i++) {
        const y = padding.top + (i / gridLines) * chartH;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();

        // Price labels
        const price = max - (i / gridLines) * range;
        ctx.fillStyle = '#4a5a70';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(formatPrice(price), w - padding.right + 8, y + 4);
    }

    const s = STOCKS.find(st => st.symbol === selectedSymbol);
    const isUp = data[data.length - 1] >= (s ? s.openPrice : data[0]);
    const lineColor = isUp ? '#00d4aa' : '#ff4466';
    const fillColor = isUp ? 'rgba(0,212,170,0.08)' : 'rgba(255,68,102,0.08)';

    // Area fill
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
        const x = padding.left + (i / (data.length - 1)) * chartW;
        const y = padding.top + (1 - (data[i] - min) / range) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2;
    for (let i = 0; i < data.length; i++) {
        const x = padding.left + (i / (data.length - 1)) * chartW;
        const y = padding.top + (1 - (data[i] - min) / range) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Current price dot
    const lastX = padding.left + chartW;
    const lastY = padding.top + (1 - (data[data.length - 1] - min) / range) * chartH;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();

    // Current price line (dashed)
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = lineColor + '66';
    ctx.lineWidth = 1;
    ctx.moveTo(padding.left, lastY);
    ctx.lineTo(w - padding.right, lastY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Open price line
    if (s) {
        const openY = padding.top + (1 - (s.openPrice - min) / range) * chartH;
        ctx.beginPath();
        ctx.setLineDash([2, 4]);
        ctx.strokeStyle = '#4a5a7066';
        ctx.lineWidth = 1;
        ctx.moveTo(padding.left, openY);
        ctx.lineTo(w - padding.right, openY);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#4a5a70';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('始値 ' + formatPrice(s.openPrice), w - padding.right + 8, openY - 6);
    }
}

function renderPortfolio() {
    const holdingsEl = document.getElementById('holdings-list');
    const symbols = Object.keys(holdings).filter(sym => holdings[sym].qty > 0);

    if (symbols.length === 0) {
        holdingsEl.innerHTML = '<div style="padding: 20px 16px; color: var(--text-muted); font-size: 12px; text-align: center;">まだ株を保有していません</div>';
    } else {
        holdingsEl.innerHTML = '';
        symbols.forEach(sym => {
            const h = holdings[sym];
            const s = STOCKS.find(st => st.symbol === sym);
            if (!s) return;
            const value = h.qty * s.currentPrice;
            const cost = h.qty * h.avgCost;
            const pl = value - cost;
            const plPct = ((pl / cost) * 100).toFixed(2);
            const dir = pl >= 0 ? 'up' : 'down';
            const sign = pl >= 0 ? '+' : '';

            const item = document.createElement('div');
            item.className = 'holding-item';
            item.innerHTML = `
                <div class="holding-top">
                    <span class="holding-symbol">${sym} <span style="color: var(--text-secondary); font-weight: 400; font-size: 11px;">${s.nameJa}</span></span>
                    <span class="holding-value">${formatPrice(value)}</span>
                </div>
                <div class="holding-bottom">
                    <span class="holding-detail">${h.qty}株 × ${formatPrice(s.currentPrice)} (平均 ${formatPrice(h.avgCost)})</span>
                    <span class="holding-pl ${dir}">${sign}${formatPrice(pl)} (${sign}${plPct}%)</span>
                </div>
            `;
            holdingsEl.appendChild(item);
        });
    }

    // Summary
    let stockValue = 0;
    symbols.forEach(sym => {
        const h = holdings[sym];
        const s = STOCKS.find(st => st.symbol === sym);
        if (s) stockValue += h.qty * s.currentPrice;
    });
    const totalAssets = cash + stockValue;
    const totalPL = totalAssets - INITIAL_CASH;
    const plDir = totalPL >= 0 ? 'up' : 'down';
    const plSign = totalPL >= 0 ? '+' : '';

    document.getElementById('cash-display').textContent = Math.round(cash).toLocaleString();
    document.getElementById('summary-cash').textContent = formatPrice(cash);
    document.getElementById('summary-stocks').textContent = formatPrice(stockValue);
    document.getElementById('total-assets').textContent = formatPrice(totalAssets);

    const plEl = document.getElementById('summary-pl');
    plEl.textContent = `${plSign}${formatPrice(totalPL)}`;
    plEl.className = 'summary-value ' + plDir;
}

function renderHistory() {
    const container = document.getElementById('history-list');
    if (tradeHistory.length === 0) {
        container.innerHTML = '<div style="padding: 16px; color: var(--text-muted); font-size: 12px; text-align: center;">取引履歴はありません</div>';
        return;
    }
    container.innerHTML = '';
    const recent = tradeHistory.slice(-20).reverse();
    recent.forEach(t => {
        const item = document.createElement('div');
        item.className = 'history-item';
        const actionLabel = t.type === 'buy' ? '買' : '売';
        const time = new Date(t.time).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        item.innerHTML = `
            <span class="history-action ${t.type}">${actionLabel}</span>
            <span class="history-detail">${t.symbol} × ${t.qty}株 @ ${formatPrice(t.price)}</span>
            <span class="history-amount">${formatPrice(t.qty * t.price)}</span>
        `;
        container.appendChild(item);
    });
}

function selectStock(symbol) {
    selectedSymbol = symbol;
    renderStockList();
    renderChartHeader();
    drawMainChart();
}

function updateAll() {
    renderStockList();
    renderChartHeader();
    drawMainChart();
    renderPortfolio();
    renderHistory();
}

// ========================================
// Trading
// ========================================
function openTrade(type) {
    tradeType = type;
    const s = STOCKS.find(st => st.symbol === selectedSymbol);
    if (!s) return;

    document.getElementById('modal-title').textContent = type === 'buy' ? '買い注文' : '売り注文';
    document.getElementById('modal-stock').textContent = `${s.symbol} (${s.nameJa})`;
    document.getElementById('modal-price').textContent = formatPrice(s.currentPrice);
    document.getElementById('trade-qty').value = 1;

    const confirmBtn = document.getElementById('modal-confirm');
    confirmBtn.className = type === 'buy' ? 'btn btn-confirm-buy' : 'btn btn-confirm-sell';
    confirmBtn.textContent = type === 'buy' ? '購入する' : '売却する';

    updateTradeTotal();
    document.getElementById('trade-modal').classList.add('active');
}

function closeModal() {
    document.getElementById('trade-modal').classList.remove('active');
}

function changeQty(delta) {
    const input = document.getElementById('trade-qty');
    let val = parseInt(input.value) || 0;
    val = Math.max(1, val + delta);
    input.value = val;
    updateTradeTotal();
}

function updateTradeTotal() {
    const s = STOCKS.find(st => st.symbol === selectedSymbol);
    if (!s) return;
    const qty = Math.max(1, parseInt(document.getElementById('trade-qty').value) || 1);
    const total = qty * s.currentPrice;
    document.getElementById('modal-total').textContent = formatPrice(total);

    const warning = document.getElementById('modal-warning');
    if (tradeType === 'buy' && total > cash) {
        warning.textContent = '残高が不足しています';
    } else if (tradeType === 'sell') {
        const held = holdings[selectedSymbol]?.qty || 0;
        if (qty > held) {
            warning.textContent = `保有数量が不足しています（保有: ${held}株）`;
        } else {
            warning.textContent = '';
        }
    } else {
        warning.textContent = '';
    }
}

function executeTrade() {
    const s = STOCKS.find(st => st.symbol === selectedSymbol);
    if (!s) return;
    const qty = Math.max(1, parseInt(document.getElementById('trade-qty').value) || 1);
    const total = qty * s.currentPrice;

    if (tradeType === 'buy') {
        if (total > cash) {
            showToast('残高が不足しています', 'error');
            return;
        }
        cash -= total;
        if (!holdings[s.symbol]) {
            holdings[s.symbol] = { qty: 0, avgCost: 0 };
        }
        const h = holdings[s.symbol];
        const totalCost = h.qty * h.avgCost + total;
        h.qty += qty;
        h.avgCost = totalCost / h.qty;

        tradeHistory.push({ type: 'buy', symbol: s.symbol, qty, price: s.currentPrice, time: Date.now() });
        showToast(`${s.symbol} を ${qty}株 購入しました`, 'success');
    } else {
        const held = holdings[s.symbol]?.qty || 0;
        if (qty > held) {
            showToast('保有数量が不足しています', 'error');
            return;
        }
        cash += total;
        holdings[s.symbol].qty -= qty;
        if (holdings[s.symbol].qty === 0) {
            delete holdings[s.symbol];
        }

        tradeHistory.push({ type: 'sell', symbol: s.symbol, qty, price: s.currentPrice, time: Date.now() });
        showToast(`${s.symbol} を ${qty}株 売却しました`, 'success');
    }

    closeModal();
    saveState();
    updateAll();
}

function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type;
    requestAnimationFrame(() => {
        toast.classList.add('show');
    });
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========================================
// Main Loop
// ========================================
updateAll();

// Price update every 2 seconds
setInterval(() => {
    simulatePrices();
    renderStockList();
    renderChartHeader();
    drawMainChart();
    renderPortfolio();
    saveState();
}, 2000);

// Handle resize
window.addEventListener('resize', drawMainChart);

// Close modal on outside click
document.getElementById('trade-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});
</script>
