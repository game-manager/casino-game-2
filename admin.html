<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Game Admin</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #17191c;
            color: #e5e5e5;
            font-family: 'Courier New', Courier, monospace;
            padding: 24px;
        }
        main {
            width: min(980px, 100%);
            margin: 0 auto;
        }
        .page-title {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            text-align: center;
            margin: 8px 0 24px;
            text-shadow: 0 0 12px #ffd70066;
        }
        .panel {
            background: #20242a;
            border: 1px solid #424852;
            border-radius: 8px;
            padding: 22px;
        }
        #login-panel {
            max-width: 420px;
            margin: 16vh auto 0;
        }
        h2 {
            color: #ffd700;
            font-size: 15px;
            letter-spacing: 3px;
            text-align: center;
            margin: 0 0 18px;
        }
        input {
            width: 100%;
            background: #101215;
            color: #ffd700;
            border: 1px solid #555d69;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        input:focus { outline: none; border-color: #ffd700; }
        button {
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            white-space: nowrap;
        }
        button:disabled {
            cursor: wait;
            opacity: 0.65;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #b30d18;
            color: #fff;
            letter-spacing: 2px;
        }
        .btn-primary:hover { background: #d11622; }
        .btn-muted {
            background: #303743;
            color: #d6d6d6;
            border: 1px solid #4c5563;
            padding: 9px 12px;
        }
        .btn-muted:hover { background: #394252; }
        .btn-sm {
            padding: 7px 10px;
            font-size: 11px;
        }
        .btn-stop { background: #8e1018; color: #fff; }
        .btn-stop:hover { background: #b31420; }
        .btn-release { background: #11612f; color: #d9ffe7; }
        .btn-release:hover { background: #16783b; }
        .btn-delete { background: #2c3038; color: #ffb3b3; border: 1px solid #5b3238; }
        .btn-delete:hover { background: #3a2026; }
        .msg {
            text-align: center;
            font-size: 12px;
            min-height: 18px;
            margin-top: 10px;
        }
        .msg.error { color: #ff5c66; }
        .msg.ok { color: #22d67b; }
        #admin-panel { display: none; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }
        .summary {
            color: #a9b0ba;
            font-size: 13px;
        }
        .summary strong {
            color: #ffd700;
            font-size: 17px;
        }
        #device-list {
            max-height: calc(100vh - 190px);
            overflow-y: auto;
            padding-right: 2px;
        }
        .device-row {
            background: #191c21;
            border: 1px solid #343a44;
            border-radius: 8px;
            padding: 13px;
            margin-bottom: 10px;
        }
        .device-row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 9px;
        }
        .device-row-name {
            color: #ffd700;
            font-size: 15px;
            font-weight: bold;
            overflow-wrap: anywhere;
        }
        .device-row-actions {
            display: flex;
            gap: 7px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .device-row-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px 14px;
            font-size: 12px;
        }
        .device-row-stat { color: #9aa2ad; overflow-wrap: anywhere; }
        .device-row-stat .sv { color: #e6e6e6; font-weight: bold; }
        .device-status-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 7px;
            vertical-align: 1px;
        }
        .badge-ok { background: #163f26; color: #43e886; }
        .badge-stop { background: #551920; color: #ff737b; }
        .row-msg {
            font-size: 11px;
            margin-top: 7px;
            min-height: 14px;
            text-align: right;
        }
        .row-msg.ok { color: #22d67b; }
        .row-msg.error { color: #ff5c66; }
        .empty-state {
            color: #9aa2ad;
            text-align: center;
            padding: 20px 10px;
            font-size: 12px;
        }
        @media (max-width: 680px) {
            body { padding: 16px; }
            .panel { padding: 18px 14px; }
            .toolbar,
            .device-row-header {
                align-items: stretch;
                flex-direction: column;
            }
            .device-row-actions { justify-content: stretch; }
            .device-row-actions button { flex: 1 1 110px; }
            .device-row-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section id="login-panel" class="panel">
            <h2>管理者画面</h2>
            <input type="password" id="admin-pass-input" placeholder="パスワードを入力" autocomplete="off">
            <button class="btn-primary" onclick="adminLogin()">確認</button>
            <div class="msg error" id="admin-pass-msg"></div>
        </section>

        <section id="admin-panel">
            <div class="page-title">DEVICE ADMIN</div>
            <div class="panel">
                <div class="toolbar">
                    <div class="summary">登録デバイス: <strong id="device-count">0</strong></div>
                    <button class="btn-muted" onclick="adminLogout()">ログアウト</button>
                </div>
                <div id="device-list">
                    <div class="empty-state">読み込み中...</div>
                </div>
            </div>
        </section>
    </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, update, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBc0Aa8WKsI75em5mScjm49TEwbcXCknKU",
    authDomain: "new-slot-93d80.firebaseapp.com",
    databaseURL: "https://new-slot-93d80-default-rtdb.firebaseio.com",
    projectId: "new-slot-93d80",
    storageBucket: "new-slot-93d80.firebasestorage.app",
    messagingSenderId: "803072299978",
    appId: "1:803072299978:web:fd43f4561dd2419b8c7533",
    measurementId: "G-89PMT15R7W"
};

const PASS_ADMIN = "2272";
const fbApp = initializeApp(firebaseConfig);
const fbDb = getDatabase(fbApp);
let stopDeviceListener = null;
let latestDevices = {};

function setAdminMessage(text, className = "error") {
    const msg = document.getElementById("admin-pass-msg");
    msg.textContent = text;
    msg.className = `msg ${className}`;
}

window.adminLogin = function() {
    const input = document.getElementById("admin-pass-input");
    const pass = input.value.trim();
    if (pass !== PASS_ADMIN) {
        setAdminMessage("パスワードが違います", "error");
        input.value = "";
        input.focus();
        return;
    }
    document.getElementById("login-panel").style.display = "none";
    document.getElementById("admin-panel").style.display = "block";
    setAdminMessage("");
    loadDeviceList();
};

window.adminLogout = function() {
    if (stopDeviceListener) {
        stopDeviceListener();
        stopDeviceListener = null;
    }
    latestDevices = {};
    document.getElementById("admin-panel").style.display = "none";
    document.getElementById("login-panel").style.display = "block";
    document.getElementById("admin-pass-input").value = "";
    document.getElementById("admin-pass-input").focus();
};

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatLastSeen(value) {
    if (typeof value !== "number") return "-";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "-";
    return date.toLocaleString("ja-JP");
}

function getDeviceName(id) {
    const dev = latestDevices[id] || {};
    return String(dev.name || id);
}

function loadDeviceList() {
    const listEl = document.getElementById("device-list");
    const countEl = document.getElementById("device-count");
    listEl.innerHTML = '<div class="empty-state">読み込み中...</div>';
    if (stopDeviceListener) stopDeviceListener();

    stopDeviceListener = onValue(ref(fbDb, "devices"), snap => {
        latestDevices = snap.val() || {};
        const keys = Object.keys(latestDevices).sort((a, b) => {
            const an = String(latestDevices[a]?.name || a);
            const bn = String(latestDevices[b]?.name || b);
            return an.localeCompare(bn, "ja");
        });

        countEl.textContent = String(keys.length);
        if (keys.length === 0) {
            listEl.innerHTML = '<div class="empty-state">デバイスなし</div>';
            return;
        }

        listEl.innerHTML = keys.map(id => {
            const dev = latestDevices[id] || {};
            const safeId = escapeHtml(id);
            const name = escapeHtml(dev.name || id);
            const isStopped = dev.emergency === true;
            const badge = isStopped
                ? '<span class="device-status-badge badge-stop">STOP</span>'
                : '<span class="device-status-badge badge-ok">OK</span>';
            const turnsInfo = (typeof dev.turnsLeft === "number" && typeof dev.totalTurns === "number")
                ? `${dev.turnsLeft} / ${dev.totalTurns} 回`
                : "-";
            const coinsVal = typeof dev.coins === "number" ? dev.coins : 0;
            const realMoney = Math.floor(coinsVal / 100);

            return `
                <div class="device-row" id="dev-row-${safeId}">
                    <div class="device-row-header">
                        <div class="device-row-name">${name}${badge}</div>
                        <div class="device-row-actions">
                            <button class="btn-sm btn-stop" data-action="stop" data-id="${safeId}">強制停止</button>
                            <button class="btn-sm btn-release" data-action="release" data-id="${safeId}">停止解除</button>
                            <button class="btn-sm btn-delete" data-action="delete" data-id="${safeId}">削除</button>
                        </div>
                    </div>
                    <div class="device-row-stats">
                        <div class="device-row-stat">コイン: <span class="sv">${coinsVal.toLocaleString()} G</span></div>
                        <div class="device-row-stat">所持金: <span class="sv">${realMoney.toLocaleString()} 円</span></div>
                        <div class="device-row-stat">残り回数: <span class="sv">${turnsInfo}</span></div>
                        <div class="device-row-stat">最終更新: <span class="sv">${formatLastSeen(dev.lastSeen)}</span></div>
                        <div class="device-row-stat">ID: <span class="sv">${safeId}</span></div>
                    </div>
                    <div class="row-msg" id="row-msg-${safeId}"></div>
                </div>
            `;
        }).join("");
    }, error => {
        listEl.innerHTML = `<div class="empty-state">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    });
}

function rowMessage(id, text, className) {
    const msg = document.getElementById(`row-msg-${id}`);
    if (!msg) return;
    msg.textContent = text;
    msg.className = `row-msg ${className}`;
}

async function setEmergency(id, value, button) {
    button.disabled = true;
    try {
        await update(ref(fbDb, `devices/${id}`), { emergency: value });
        rowMessage(id, value ? "強制停止しました" : "停止解除しました", value ? "error" : "ok");
    } catch (error) {
        rowMessage(id, `更新できませんでした: ${error.message}`, "error");
    } finally {
        button.disabled = false;
    }
}

async function deleteDevice(id, button) {
    const name = getDeviceName(id);
    if (!confirm(`${name} を削除しますか？`)) return;
    button.disabled = true;
    try {
        await remove(ref(fbDb, `devices/${id}`));
    } catch (error) {
        button.disabled = false;
        rowMessage(id, `削除できませんでした: ${error.message}`, "error");
    }
}

document.getElementById("device-list").addEventListener("click", event => {
    const button = event.target.closest("button[data-action][data-id]");
    if (!button) return;
    const id = button.dataset.id;
    if (button.dataset.action === "stop") setEmergency(id, true, button);
    if (button.dataset.action === "release") setEmergency(id, false, button);
    if (button.dataset.action === "delete") deleteDevice(id, button);
});

document.getElementById("admin-pass-input").addEventListener("keydown", event => {
    if (event.key === "Enter") adminLogin();
});
document.getElementById("admin-pass-input").focus();
</script>
</body>
</html>
