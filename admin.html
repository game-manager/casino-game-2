<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジノ 管理者ページ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 6px;
            text-shadow: 0 0 12px #ffd70066;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* ── ログイン画面 ── */
        #login-screen {
            max-width: 400px;
            margin: 80px auto;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 14px;
            padding: 36px 32px;
        }
        #login-screen h2 { color: #ffd700; text-align: center; margin-bottom: 24px; letter-spacing: 3px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #888; font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #ffd700; }
        #login-btn, #logout-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #c0a000, #806800);
            color: #000; border: none; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 15px;
            font-weight: bold; letter-spacing: 3px; cursor: pointer;
            margin-top: 6px; transition: background 0.2s;
        }
        #login-btn:hover { background: linear-gradient(135deg, #ffd700, #c0a000); }
        #login-error { color: #ff5555; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

        /* ── メイン画面 ── */
        #main-screen { display: none; max-width: 900px; margin: 0 auto; }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px;
        }
        .admin-label { color: #888; font-size: 12px; letter-spacing: 2px; }
        .admin-label span { color: #ffd700; font-weight: bold; }
        #logout-btn {
            width: auto; padding: 8px 20px; font-size: 12px; letter-spacing: 2px;
            background: #2a2a2a; color: #aaa; border: 1px solid #444;
            border-radius: 6px; margin-top: 0;
        }
        #logout-btn:hover { background: #3a1a1a; color: #ff5555; border-color: #ff5555; }

        /* プレイヤー一覧 */
        .section-title {
            color: #888; font-size: 11px; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 14px;
            padding-bottom: 8px; border-bottom: 1px solid #333;
        }
        #players-section { margin-bottom: 32px; }
        #players-table {
            width: 100%;
            border-collapse: collapse;
        }
        #players-table th {
            background: #1a1a1a; color: #888;
            font-size: 11px; letter-spacing: 2px;
            padding: 10px 14px; text-align: left;
            border-bottom: 2px solid #333;
        }
        #players-table td {
            padding: 10px 14px;
            border-bottom: 1px solid #222;
            font-size: 14px;
            vertical-align: middle;
        }
        #players-table tr:hover td { background: #1a1a1a; }
        .player-id { color: #888; font-size: 12px; }
        .player-coins { color: #ffd700; font-weight: bold; }
        .edit-btn {
            padding: 5px 12px; background: #1a2a1a;
            color: #44ff88; border: 1px solid #44ff88;
            border-radius: 5px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 12px;
            transition: all 0.15s;
        }
        .edit-btn:hover { background: #44ff88; color: #000; }
        .reset-btn {
            padding: 5px 12px; background: #2a1a1a;
            color: #ff5555; border: 1px solid #ff5555;
            border-radius: 5px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 12px;
            transition: all 0.15s; margin-left: 6px;
        }
        .reset-btn:hover { background: #ff5555; color: #fff; }
        .badge-online {
            display: inline-block; width: 8px; height: 8px;
            background: #44ff88; border-radius: 50%;
            margin-right: 8px; box-shadow: 0 0 6px #44ff88;
        }
        .badge-offline {
            display: inline-block; width: 8px; height: 8px;
            background: #555; border-radius: 50%;
            margin-right: 8px;
        }
        #no-players { color: #555; text-align: center; padding: 30px; font-size: 13px; }

        /* 残高編集モーダル */
        #edit-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #edit-modal.open { display: flex; }
        .modal-box {
            background: #1a1a1a; border: 2px solid #c0a000;
            border-radius: 14px; padding: 32px 28px; width: 360px;
        }
        .modal-box h3 { color: #ffd700; margin-bottom: 20px; letter-spacing: 2px; }
        .modal-box label { color: #888; font-size: 11px; letter-spacing: 2px; display: block; margin-bottom: 6px; }
        .modal-box input {
            width: 100%; padding: 10px 14px;
            background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 18px;
            margin-bottom: 18px;
        }
        .modal-box input:focus { outline: none; border-color: #ffd700; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-save {
            flex: 1; padding: 11px; background: linear-gradient(135deg,#c0a000,#806800);
            color: #000; border: none; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 14px;
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }
        .modal-save:hover { background: linear-gradient(135deg,#ffd700,#c0a000); }
        .modal-cancel {
            flex: 1; padding: 11px; background: #2a2a2a;
            color: #888; border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 14px;
            cursor: pointer; letter-spacing: 2px;
        }
        .modal-cancel:hover { background: #3a3a3a; color: #ccc; }

        /* プレイ履歴 */
        #history-section { margin-bottom: 32px; }
        #history-filter { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
        #history-filter label { color: #888; font-size: 12px; letter-spacing: 1px; }
        #history-player-select {
            padding: 7px 12px; background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 13px;
            min-width: 180px;
        }
        #history-player-select:focus { outline: none; border-color: #ffd700; }
        #history-list { max-height: 340px; overflow-y: auto; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 14px; border-bottom: 1px solid #1e1e1e;
            font-size: 12px;
        }
        .history-item:hover { background: #161616; }
        .history-result { font-weight: bold; }
        .history-result.win { color: #44ff88; }
        .history-result.lose { color: #ff5555; }
        .history-result.combo { color: #88ffff; }
        .history-time { color: #555; font-size: 11px; }
        .history-bet { color: #888; }
        .history-coins { color: #ffd700; }
        #no-history { color: #555; text-align: center; padding: 24px; font-size: 13px; }

        /* 全体リセット */
        #reset-section {
            background: #1a0a0a; border: 1px solid #3a1a1a;
            border-radius: 10px; padding: 20px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #reset-section .reset-desc { color: #888; font-size: 12px; }
        #reset-section .reset-desc strong { color: #ff5555; }
        #global-reset-btn {
            padding: 10px 22px; background: #3a0000;
            color: #ff5555; border: 1px solid #ff5555;
            border-radius: 7px; cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px; font-weight: bold; letter-spacing: 2px;
            transition: all 0.15s; white-space: nowrap;
        }
        #global-reset-btn:hover { background: #ff5555; color: #fff; }

        /* ライブ更新インジケーター */
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #0a1a0a; border: 1px solid #44ff88;
            border-radius: 20px; padding: 3px 10px;
            font-size: 11px; color: #44ff88; letter-spacing: 1px;
        }
        .live-dot {
            width: 7px; height: 7px; background: #44ff88;
            border-radius: 50%; animation: livePulse 1.2s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,100% { opacity: 1; } 50% { opacity: 0.3; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
    <h2>🔐 ADMIN LOGIN</h2>
    <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button id="login-btn" onclick="doLogin()">LOGIN</button>
    <div id="login-error"></div>
</div>

<!-- メイン管理画面 -->
<div id="main-screen">
    <h1>⚙ CASINO ADMIN</h1>
    <p class="subtitle">REMOTE MANAGEMENT PANEL</p>

    <div class="top-bar">
        <div class="admin-label">ログイン中: <span id="admin-email-label">-</span>
            &nbsp;&nbsp;<span class="live-badge"><span class="live-dot"></span>LIVE</span>
        </div>
        <button id="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>

    <!-- プレイヤー一覧 -->
    <div id="players-section">
        <div class="section-title">👥 プレイヤー一覧 — 残高管理</div>
        <table id="players-table">
            <thead>
                <tr>
                    <th>STATUS</th>
                    <th>プレイヤーID</th>
                    <th>残高 (G)</th>
                    <th>最終プレイ</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="players-tbody">
                <tr><td colspan="5" id="no-players">読み込み中…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- プレイ履歴 -->
    <div id="history-section">
        <div class="section-title">📋 プレイ履歴</div>
        <div id="history-filter">
            <label>プレイヤー:</label>
            <select id="history-player-select" onchange="loadHistory()">
                <option value="all">全員</option>
            </select>
        </div>
        <div id="history-list">
            <div id="no-history">プレイ履歴がありません</div>
        </div>
    </div>

    <!-- 全体リセット -->
    <div id="reset-section">
        <div class="reset-desc">
            <strong>⚠ 全体リセット</strong><br>
            全プレイヤーの残高を 10,000G に戻し、プレイ履歴を消去します。
        </div>
        <button id="global-reset-btn" onclick="globalReset()">🔄 全員リセット</button>
    </div>
</div>

<!-- 残高編集モーダル -->
<div id="edit-modal">
    <div class="modal-box">
        <h3>✏ 残高を変更</h3>
        <label>プレイヤーID</label>
        <div id="modal-player-id" style="color:#888;font-size:13px;margin-bottom:14px;"></div>
        <label>新しい残高 (G)</label>
        <input type="number" id="modal-coins-input" min="0" placeholder="10000">
        <div class="modal-actions">
            <button class="modal-save" onclick="saveCoins()">保存</button>
            <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, onValue, set, remove, get, child }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ============================================================
//  🔧 Firebase 設定 — ここを自分のプロジェクトの値に書き換えてください
// ============================================================
const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
};
// ============================================================

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

let editingPlayerId = null;
let playersData     = {};
let historyUnsubscribe = null;

// ---------- 認証 ----------
window.doLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
        document.getElementById('login-error').textContent = 'ログイン失敗: ' + e.message;
    }
};

window.doLogout = async () => {
    await signOut(auth);
};

onAuthStateChanged(auth, user => {
    if (user) {
        document.getElementById('login-screen').style.display  = 'none';
        document.getElementById('main-screen').style.display   = 'block';
        document.getElementById('admin-email-label').textContent = user.email;
        startListeners();
    } else {
        document.getElementById('login-screen').style.display  = 'block';
        document.getElementById('main-screen').style.display   = 'none';
        stopListeners();
    }
});

// ログインフォームでEnterキー対応
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
        window.doLogin();
    }
});

// ---------- リスナー ----------
let playersRef = null;

function startListeners() {
    playersRef = ref(db, 'players');
    onValue(playersRef, snap => {
        playersData = snap.val() || {};
        renderPlayers();
        rebuildHistoryFilter();
        loadHistory();
    });
}

function stopListeners() {
    playersData = {};
}

// ---------- プレイヤー一覧レンダリング ----------
function renderPlayers() {
    const tbody = document.getElementById('players-tbody');
    const ids = Object.keys(playersData);
    if (ids.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" id="no-players">プレイヤーがいません</td></tr>';
        return;
    }
    tbody.innerHTML = ids.map(id => {
        const p = playersData[id];
        const coins  = (p.coins ?? 10000).toLocaleString();
        const online = p.online ? '<span class="badge-online"></span>オンライン' : '<span class="badge-offline"></span>オフライン';
        const lastPlay = p.lastPlayAt
            ? new Date(p.lastPlayAt).toLocaleString('ja-JP')
            : '—';
        return `
        <tr>
            <td>${online}</td>
            <td class="player-id">${escHtml(id)}</td>
            <td class="player-coins">${coins} G</td>
            <td style="color:#666;font-size:12px">${lastPlay}</td>
            <td>
                <button class="edit-btn" onclick="openEdit('${escHtml(id)}')">✏ 変更</button>
                <button class="reset-btn" onclick="resetPlayer('${escHtml(id)}')">↩ リセット</button>
            </td>
        </tr>`;
    }).join('');
}

// ---------- 残高変更モーダル ----------
window.openEdit = (id) => {
    editingPlayerId = id;
    document.getElementById('modal-player-id').textContent = id;
    document.getElementById('modal-coins-input').value = playersData[id]?.coins ?? 10000;
    document.getElementById('edit-modal').classList.add('open');
    setTimeout(() => document.getElementById('modal-coins-input').focus(), 100);
};

window.closeModal = () => {
    document.getElementById('edit-modal').classList.remove('open');
    editingPlayerId = null;
};

window.saveCoins = async () => {
    if (!editingPlayerId) return;
    const val = parseInt(document.getElementById('modal-coins-input').value);
    if (isNaN(val) || val < 0) { alert('正しい数値を入力してください'); return; }
    await set(ref(db, `players/${editingPlayerId}/coins`), val);
    // 管理者操作ログ
    const logRef = ref(db, `adminLogs/${Date.now()}`);
    await set(logRef, { action: 'setCoins', playerId: editingPlayerId, value: val, at: Date.now() });
    closeModal();
};

// Enterキーで保存
document.getElementById('modal-coins-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.saveCoins();
});

// ---------- 個別リセット ----------
window.resetPlayer = async (id) => {
    if (!confirm(`「${id}」の残高を 10,000G にリセットしますか？`)) return;
    await set(ref(db, `players/${id}/coins`), 10000);
    // 履歴削除
    await remove(ref(db, `history/${id}`));
    const logRef = ref(db, `adminLogs/${Date.now()}`);
    await set(logRef, { action: 'resetPlayer', playerId: id, at: Date.now() });
};

// ---------- 全体リセット ----------
window.globalReset = async () => {
    if (!confirm('全プレイヤーの残高を 10,000G にリセットし、プレイ履歴を全消去しますか？\nこの操作は取り消せません。')) return;
    const ids = Object.keys(playersData);
    for (const id of ids) {
        await set(ref(db, `players/${id}/coins`), 10000);
    }
    await remove(ref(db, 'history'));
    const logRef = ref(db, `adminLogs/${Date.now()}`);
    await set(logRef, { action: 'globalReset', at: Date.now() });
    alert('リセット完了しました。');
};

// ---------- 履歴フィルター再構築 ----------
function rebuildHistoryFilter() {
    const sel = document.getElementById('history-player-select');
    const cur = sel.value;
    sel.innerHTML = '<option value="all">全員</option>';
    Object.keys(playersData).forEach(id => {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = id;
        sel.appendChild(opt);
    });
    if (cur) sel.value = cur;
}

// ---------- 履歴読み込み ----------
window.loadHistory = () => {
    const sel = document.getElementById('history-player-select').value;
    const histRef = sel === 'all' ? ref(db, 'history') : ref(db, `history/${sel}`);
    get(histRef).then(snap => {
        const container = document.getElementById('history-list');
        const raw = snap.val();
        if (!raw) {
            container.innerHTML = '<div id="no-history">プレイ履歴がありません</div>';
            return;
        }
        // フラット化して時刻降順ソート
        let items = [];
        if (sel === 'all') {
            Object.entries(raw).forEach(([pid, entries]) => {
                Object.values(entries).forEach(e => items.push({ ...e, pid }));
            });
        } else {
            Object.values(raw).forEach(e => items.push({ ...e, pid: sel }));
        }
        items.sort((a, b) => b.at - a.at);
        items = items.slice(0, 100); // 最新100件

        container.innerHTML = items.map(e => {
            const time = new Date(e.at).toLocaleString('ja-JP');
            const resClass = e.result === 'win' ? 'win' : e.result === 'combo' ? 'combo' : 'lose';
            const resLabel = e.result === 'win' ? `🎉 当たり ×${e.mult}` : e.result === 'combo' ? `🎊 コンボ ×${e.mult}` : '💔 ハズレ';
            const change = e.result !== 'lose' ? `+${(e.bet * e.mult).toLocaleString()}G` : `-${e.bet.toLocaleString()}G`;
            return `
            <div class="history-item">
                <span class="player-id">${escHtml(e.pid)}</span>
                <span class="history-result ${resClass}">${resLabel}</span>
                <span class="history-bet">Bet: ${e.bet?.toLocaleString()}G</span>
                <span class="history-coins">${change}</span>
                <span class="history-time">${time}</span>
            </div>`;
        }).join('');
    });
};

// ---------- ユーティリティ ----------
function escHtml(str) {
    return String(str).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);
}
</script>
</body>
</html>
