    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジノ 管理者ページ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f0f0f; color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh; padding: 20px;
        }
        h1 {
            text-align: center; color: #ffd700; font-size: 24px;
            letter-spacing: 4px; margin-bottom: 6px;
            text-shadow: 0 0 12px #ffd70066;
        }
        .subtitle { text-align: center; color: #666; font-size: 11px; letter-spacing: 2px; margin-bottom: 30px; }

        /* ログイン */
        #login-screen {
            max-width: 400px; margin: 80px auto;
            background: #1a1a1a; border: 2px solid #444;
            border-radius: 14px; padding: 36px 32px;
        }
        #login-screen h2 { color: #ffd700; text-align: center; margin-bottom: 24px; letter-spacing: 3px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #888; font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 14px; background: #111; color: #ffd700;
            border: 1px solid #444; border-radius: 7px;
            font-family: 'Courier New', monospace; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #ffd700; }
        #login-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #c0a000, #806800);
            color: #000; border: none; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 15px;
            font-weight: bold; letter-spacing: 3px; cursor: pointer; margin-top: 6px;
        }
        #login-btn:hover { background: linear-gradient(135deg, #ffd700, #c0a000); }
        #login-error { color: #ff5555; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }
